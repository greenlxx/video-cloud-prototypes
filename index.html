<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频云平台 — 原型导航</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  font-size: 14px;
  color: rgba(0,0,0,.88);
  background: #f5f5f5;
}

/* ===== 顶部总栏 ===== */
.topbar {
  background: #165DFF; color: #fff;
  height: 48px; display: flex; align-items: center;
  padding: 0 24px; gap: 12px;
  position: sticky; top: 0; z-index: 100;
}
.topbar h1 { font-size: 15px; font-weight: 600; white-space: nowrap; }
.ver-select {
  background: rgba(255,255,255,.15); color: #fff;
  border: none; border-radius: 4px; padding: 4px 10px;
  font-size: 12px; cursor: pointer;
}
.ver-select option { color: #333; background: #fff; }

/* ===== 首页 ===== */
.home { display: none; }
.home.active { display: block; }
.home-scroll { overflow-y: auto; height: calc(100vh - 48px); }
.main { max-width: 1200px; margin: 0 auto; padding: 24px; }

/* ===== 概览统计 ===== */
.overview { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 24px; }
.ov-card { background: #fff; border-radius: 8px; padding: 20px; text-align: center; border: 1px solid #f0f0f0; box-shadow: 0 1px 2px rgba(0,0,0,.03); }
.ov-num { font-size: 32px; font-weight: 700; line-height: 1; }
.ov-label { font-size: 13px; color: rgba(0,0,0,.45); margin-top: 6px; }
.ov-sub { font-size: 11px; color: rgba(0,0,0,.25); margin-top: 2px; }

/* ===== 图例 ===== */
.legend { display: flex; gap: 24px; align-items: center; padding: 12px 20px; background: #fff; border-radius: 8px; border: 1px solid #f0f0f0; margin-bottom: 24px; box-shadow: 0 1px 2px rgba(0,0,0,.03); }
.legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; }
.ldot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.ldot.r { background: #ff4d4f; }
.ldot.o { background: #faad14; }
.ldot.g { background: #52c41a; }

/* ===== 域标题 ===== */
.dhd { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #f0f0f0; }
.dbar { width: 4px; height: 20px; border-radius: 2px; flex-shrink: 0; }
.dhd h2 { font-size: 16px; font-weight: 600; }
.dhd .sub { font-size: 12px; color: rgba(0,0,0,.45); margin-left: 8px; }
.dhd .tags { margin-left: auto; font-size: 12px; color: rgba(0,0,0,.45); display: flex; gap: 12px; }
.tags span { display: inline-flex; align-items: center; gap: 4px; }

/* ===== 卡片网格 ===== */
.cards { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 24px; }
.card { display: flex; flex-direction: column; background: #fff; border-radius: 8px; padding: 20px; border: 1px solid #f0f0f0; cursor: pointer; transition: all .2s; text-decoration: none; color: inherit; box-shadow: 0 1px 2px rgba(0,0,0,.03); }
.card:hover { border-color: #165DFF; box-shadow: 0 4px 16px rgba(22,93,255,.12); transform: translateY(-2px); }
.ctop { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
.cicon { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.cbody { flex: 1; min-width: 0; }
.ctitle { font-size: 15px; font-weight: 600; }
.cdesc { font-size: 12px; color: rgba(0,0,0,.45); margin-top: 4px; }
.ctype { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; padding: 2px 10px; border-radius: 12px; font-weight: 500; }
.ctype.n { background: #fff2f0; color: #ff4d4f; }
.ctype.c { background: #fffbe6; color: #d46b08; }
.ctype.k { background: #f6ffed; color: #52c41a; }
.cbot { display: flex; align-items: center; gap: 8px; font-size: 12px; color: rgba(0,0,0,.45); margin-top: auto; padding-top: 10px; border-top: 1px solid #f0f0f0; }

/* ================================================================
   原型内页
   ================================================================ */
.detail { display: none; height: 100vh; flex-direction: column; }
.detail.active { display: flex; }

/* 内页顶栏 */
.dtop { background: #165DFF; color: #fff; height: 48px; display: flex; align-items: center; padding: 0 20px; gap: 12px; flex-shrink: 0; }
.dtop .back { background: rgba(255,255,255,.15); border: none; color: #fff; width: 28px; height: 28px; border-radius: 4px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
.dtop .back:hover { background: rgba(255,255,255,.25); }
.dtop .brand { font-size: 14px; font-weight: 500; white-space: nowrap; }
.dtop .tab-bar { display: flex; align-items: center; gap: 0; margin-left: 24px; overflow-x: auto; flex: 1; scrollbar-width: none; }
.dtop .tab-bar::-webkit-scrollbar { display: none; }
.dtop .tab-item {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px; font-size: 12px; color: rgba(255,255,255,.7);
  cursor: pointer; white-space: nowrap; border-radius: 4px 4px 0 0;
  transition: all .15s; position: relative;
}
.dtop .tab-item:hover { background: rgba(255,255,255,.1); color: #fff; }
.dtop .tab-item.active { background: #fff; color: #165DFF; font-weight: 600; }
.dtop .tab-item .close-tab {
  width: 14px; height: 14px; border-radius: 50%; border: none;
  background: transparent; color: rgba(255,255,255,.4); cursor: pointer;
  font-size: 10px; display: flex; align-items: center; justify-content: center;
  padding: 0; line-height: 1; margin-left: 2px;
}
.dtop .tab-item .close-tab:hover { background: rgba(0,0,0,.15); color: #fff; }
.dtop .tab-item.active .close-tab { color: rgba(0,0,0,.3); }
.dtop .tab-item.active .close-tab:hover { background: rgba(0,0,0,.08); color: #333; }

/* 内页主体 */
.ibody { display: flex; flex: 1; overflow: hidden; }

/* 内页侧栏 */
.iside {
  width: 220px; background: #001529; color: #fff;
  display: flex; flex-direction: column; flex-shrink: 0;
  overflow-y: auto; padding: 8px 0;
}
.isec {
  padding: 10px 16px 4px;
  font-size: 10px; color: rgba(255,255,255,.3);
  text-transform: uppercase; letter-spacing: .06em;
}
.iitem {
  padding: 10px 16px; cursor: pointer; font-size: 13px;
  color: rgba(255,255,255,.7); display: flex; align-items: center;
  gap: 8px; transition: all .15s;
  border-left: 3px solid transparent;
}
.iitem:hover { background: rgba(255,255,255,.08); color: #fff; }
.iitem.active { background: #165DFF; color: #fff; border-left-color: #fff; }
.idot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.idot.n { background: #ff4d4f; }
.idot.c { background: #faad14; }
.idot.k { background: #52c41a; }

/* 右侧内容区 */
.imain { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #f5f5f5; }

/* 页面标题区 */
.page-hd {
  padding: 16px 20px 0;
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.page-bar { width: 3px; height: 16px; border-radius: 1.5px; flex-shrink: 0; }
.page-title { font-size: 16px; font-weight: 600; }
.page-type { font-size: 11px; padding: 1px 8px; border-radius: 10px; }
.page-type.n { background: #fff2f0; color: #ff4d4f; }
.page-type.c { background: #fffbe6; color: #d46b08; }
.page-type.k { background: #f6ffed; color: #52c41a; }

/* iframe 容器 */
.iframe-wrap { flex: 1; margin: 12px 20px 20px; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 2px rgba(0,0,0,.03); position: relative; }
.iframe-wrap iframe { width: 100%; height: 100%; border: none; }
.iframe-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: rgba(0,0,0,.25); gap: 12px; font-size: 14px; }
.iframe-empty .big { font-size: 48px; }

@media (max-width: 900px) { .cards { grid-template-columns: repeat(2,1fr); } .iside { width: 180px; } }
@media (max-width: 600px) { .cards { grid-template-columns: 1fr; } .overview { grid-template-columns: repeat(2,1fr); } .iside { display: none; } }
</style>
</head>
<body>

<!-- 顶部总栏 -->
<div class="topbar">
  <div style="display:flex;align-items:center;gap:8px;">
    <h1>视频云平台</h1>
    <select class="ver-select" id="versionSelect" onchange="switchVer(this.value)"></select>
  </div>
</div>

<!-- ===== 首页 ===== -->
<div class="home active" id="homeView">
  <div class="home-scroll">
    <div class="main">
      <div class="overview" id="overviewGrid"></div>
      <div class="legend">
        <div class="legend-item"><span class="ldot r"></span> 全新 — 本期新建设的页面</div>
        <div class="legend-item"><span class="ldot o"></span> 改造 — 本期优化改造的功能</div>
        <div class="legend-item"><span class="ldot g"></span> 保留 — 现已有功能参考展示</div>
      </div>
      <div id="homeCards"></div>
    </div>
  </div>
</div>

<!-- ===== 原型内页 ===== -->
<div class="detail" id="detailView">
  <!-- 顶栏 -->
  <div class="dtop">
    <button class="back" onclick="backHome()">←</button>
    <span class="brand">视频云平台</span>
    <div class="tab-bar" id="tabBar"></div>
  </div>

  <div class="ibody">
    <!-- 侧边栏 -->
    <aside class="iside" id="detailSidebar"></aside>

    <!-- 右侧 -->
    <div class="imain">
      <!-- 页面标题 -->
      <div class="page-hd" id="pageHeader">
        <span class="page-bar" id="pageBar" style="background:#722ED1"></span>
        <span class="page-title" id="pageTitle">点位智能标注</span>
        <span class="page-type" id="pageTypeBadge">● 保留</span>
      </div>
      <!-- iframe -->
      <div class="iframe-wrap" id="iframeWrap">
        <iframe id="protoFrame" allowfullscreen></iframe>
      </div>
    </div>
  </div>
</div>

<script>
const VERSIONS = {
  "v202606": { label: "v202606 · 6月基线版本", type:"baseline" },
  "龙江市监-v202606": { label: "龙江市监 · 6月项目版本", type:"project" }
};
const DOMAIN_COLORS = { "数据治理":"#722ED1", "智能运维":"#13C2C2", "轨迹查询":"#1677FF", "布控管理":"#FA8C16", "设备管理":"#52C41A", "报警中心":"#FF4D4F", "系统管理":"#86909C", "平台概览":"#165DFF" };
const T = { n:{cn:"全新",cls:"n"}, c:{cn:"改造",cls:"c"}, k:{cn:"保留",cls:"k"}, s:{cn:"占位",cls:"s"} };

// ================================================================
// 📦 数据
// ================================================================
const DATA = {
  "v202606": {
    domains: {
      "数据治理": [
        { menu2:"点位智能标注", icon:"🤖", bg:"#f9f0ff", type:"k", desc:"Epic-G · 业务标签智能标注", pages:"list.html + detail.html · 标注任务与结果确认", url:"" },
        { menu2:"点位治理效能", icon:"📊", bg:"#e6fffb", type:"c", desc:"Epic-H · 部门治理效能总览", pages:"index.html · 治理总览 + 部门排行", url:"" },
        { menu2:"标签管理", icon:"🏷️", bg:"#e6f4ff", type:"k", desc:"Epic-I · 单一标签管理视图", pages:"list.html · 业务域管理 + 多级标签树维护", url:"" },
        { menu2:"基础目录设备管理", icon:"📹", bg:"#fff7e6", type:"c", desc:"Epic-J · 批量配置 + 管理单位", pages:"list.html + detail.html · 目录联动 + 批量操作", url:"" },
        { menu2:"业务目录管理", icon:"📁", bg:"#e6f4ff", type:"c", desc:"Epic-K · 6种目录生成规则", pages:"list.html + preview.html · 2个页面", url:"" },
        { menu2:"经纬度治理", icon:"🌐", bg:"#fff2f0", type:"n", desc:"Epic-L · 坐标拾取与补全", pages:"index.html · 地图拾取 + 设备卡片", url:"" }
      ],
      "智能运维": [
        { menu2:"检测算法管理", icon:"⚙️", bg:"#f0f5ff", type:"c", desc:"Epic-A · 算法库与配置", pages:"list.html · 算法卡片列表", url:"" },
        { menu2:"巡检任务", icon:"📋", bg:"#fff0f6", type:"c", desc:"Epic-B · 多维度巡检管理", pages:"list.html + create.html + detail.html", url:"" },
        { menu2:"巡检日志", icon:"📄", bg:"#f6ffed", type:"n", desc:"Epic-C · 替换链路日志", pages:"list.html + detail.html + topology.html", url:"" },
        { menu2:"可用性报告", icon:"📈", bg:"#e6fffb", type:"n", desc:"Epic-D · SLA大盘统计", pages:"index.html · KPI卡片 + 趋势图", url:"" },
        { menu2:"故障预警", icon:"🔮", bg:"#f0f5ff", type:"n", desc:"Epic-E · 模型预判 · 提前预警", pages:"2个页面 · 含预警配置Tab", url:"" },
        { menu2:"设备告警", icon:"🔔", bg:"#fff2f0", type:"n", desc:"Epic-F · 告警列表 + 详情处置", pages:"list + detail · 含处置备注/批量确认", url:"" }
      ],
      "轨迹查询": [
        { menu2:"人员轨迹查询", icon:"👤", bg:"#e6f7ff", type:"c", desc:"以图搜人(ReID) / 文本搜人", pages:"搜索页 + 结果页 · Tab切换", url:"" },
        { menu2:"车辆轨迹查询", icon:"🚗", bg:"#f6ffed", type:"n", desc:"以图搜车 / 车牌号查询", pages:"搜索页 + 结果页 · 三Tab切换", url:"" },
        { menu2:"多目标对比", icon:"🔀", bg:"#fff7e6", type:"n", desc:"2-3人轨迹叠加 / 同行检测", pages:"独立页面 · 含时空分析摘要", url:"" }
      ]
    }
  },
  "龙江市监-v202606": {
    domains: {
      "数据治理": [
        { menu2:"点位治理效能", icon:"📊", bg:"#e6fffb", type:"n", desc:"部门治理效能总览", pages:"index.html", url:"" },
        { menu2:"治理进度统计", icon:"📈", bg:"#e6f4ff", type:"n", desc:"治理进度概览", pages:"index.html", url:"" }
      ]
    }
  }
};

// ================================================================
let curVer = "v202606";
let allData = {};
let openTabs = [];   // [{menu2, domain, item}] 按打开顺序
let activeTab = null; // 当前选中的 menu2

function init() {
  document.getElementById('versionSelect').innerHTML = Object.entries(VERSIONS).map(([k,v]) => `<option value="${k}">${v.label}</option>`).join('');
  renderHome();
}
function switchVer(v) { curVer = v; backHome(); }

/* ---- 首页 ---- */
function renderHome() {
  const data = DATA[curVer];
  if (!data) return;
  const { domains } = data;
  allData = data;

  let nN=0, nC=0, nK=0, nM=0, nU=0;
  Object.values(domains).forEach(items => { items.forEach(p => {
    nM++; if (p.type==='n') nN++; else if (p.type==='c') nC++; else if (p.type==='k') nK++;
    if (p.url) nU++;
  });});

  document.getElementById('overviewGrid').innerHTML = `
    <div class="ov-card"><div class="ov-num" style="color:#ff4d4f">${nN}</div><div class="ov-label">全新模块</div><div class="ov-sub">本期新增</div></div>
    <div class="ov-card"><div class="ov-num" style="color:#faad14">${nC}</div><div class="ov-label">改造模块</div><div class="ov-sub">本期优化</div></div>
    <div class="ov-card"><div class="ov-num" style="color:#165DFF">${nM}</div><div class="ov-label">迭代模块</div><div class="ov-sub">本期范围</div></div>
    <div class="ov-card"><div class="ov-num" style="color:#52c41a">${nU}</div><div class="ov-label">可预览文件</div><div class="ov-sub">已生成原型</div></div>`;

  const dk = Object.keys(domains);
  let html = '';
  dk.forEach(d => {
    const items = domains[d];
    const color = DOMAIN_COLORS[d] || '#165DFF';
    const dn = items.filter(i=>i.type==='n').length;
    const dc = items.filter(i=>i.type==='c').length;
    html += `<div class="dhd"><span class="dbar" style="background:${color}"></span><h2>${d}</h2><span class="sub">${items.length}个模块</span><div class="tags">${dn?`<span><span class="ldot r"></span>${dn}个全新</span>`:''}${dc?`<span><span class="ldot o"></span>${dc}个改造</span>`:''}</div></div><div class="cards">`;
    items.forEach(p => {
      const t = T[p.type];
      html += `<div class="card" onclick="openDetail('${d}','${p.menu2}')">
        <div class="ctop"><div class="cicon" style="background:${p.bg}">${p.icon}</div>
        <div class="cbody"><div class="ctitle">${p.menu2}</div><div class="cdesc">${p.desc}</div></div>
        <span class="ctype ${t.cls}">● ${t.cn}</span></div>
        <div class="cbot"><span>📄 ${p.pages}</span></div></div>`;
    });
    html += '</div>';
  });
  document.getElementById('homeCards').innerHTML = html;
}

/* ---- 打开内页 ---- */
function openDetail(domain, menu2) {
  document.getElementById('homeView').classList.remove('active');
  document.getElementById('detailView').classList.add('active');

  // 构建全菜单（用于侧边栏）
  renderSidebar(domain, menu2);

  // 如果这个 tab 已经打开，直接切换
  const existing = openTabs.find(t => t.menu2 === menu2);
  if (existing) {
    activeTab = menu2;
    renderTabs();
    showProto(menu2);
    return;
  }

  // 新开 tab
  const data = allData;
  let foundItem = null;
  outer: for (const [d, items] of Object.entries(data.domains)) {
    for (const item of items) {
      if (item.menu2 === menu2) { foundItem = item; break outer; }
    }
  }
  if (!foundItem) return;

  openTabs.push({ menu2, domain, item: foundItem });
  activeTab = menu2;
  renderTabs();
  showProto(menu2);
}

/* ---- 侧边栏 ---- */
function renderSidebar(activeDomain, activeMenu2) {
  const data = allData;
  if (!data) return;
  const doms = data.domains;
  const dk = Object.keys(doms);
  let html = '';
  dk.forEach(d => {
    const color = DOMAIN_COLORS[d] || '#165DFF';
    html += `<div class="isec" style="color:${color}">${d}</div>`;
    doms[d].forEach(p => {
      const t = T[p.type];
      const active = (p.menu2 === activeMenu2) ? ' active' : '';
      html += `<div class="iitem${active}" onclick="switchToTab('${p.menu2}')"><span class="idot ${t.cls}"></span><span>${p.menu2}</span></div>`;
    });
  });
  document.getElementById('detailSidebar').innerHTML = html;
}

/* ---- Tab 栏 ---- */
function renderTabs() {
  const bar = document.getElementById('tabBar');
  bar.innerHTML = openTabs.map(t => {
    const active = (t.menu2 === activeTab) ? ' active' : '';
    return `<div class="tab-item${active}" onclick="switchToTab('${t.menu2}')">
      ${t.menu2}
      <button class="close-tab" onclick="event.stopPropagation();closeTab('${t.menu2}')">×</button>
    </div>`;
  }).join('');
}

/* ---- Tab/侧栏切换 ---- */
function switchToTab(menu2) {
  activeTab = menu2;
  renderTabs();

  // 更新侧边栏高亮
  document.querySelectorAll('.iitem').forEach(el => {
    el.classList.toggle('active', el.textContent.trim().includes(menu2));
  });

  showProto(menu2);
}

/* ---- 关闭 Tab ---- */
function closeTab(menu2) {
  const idx = openTabs.findIndex(t => t.menu2 === menu2);
  if (idx === -1) return;
  openTabs.splice(idx, 1);

  if (openTabs.length === 0) {
    backHome();
    return;
  }

  // 如果关掉的是当前激活的，跳到隔壁
  if (activeTab === menu2) {
    activeTab = openTabs[Math.min(idx, openTabs.length - 1)].menu2;
  }

  renderTabs();
  // 更新侧边栏高亮
  document.querySelectorAll('.iitem').forEach(el => {
    el.classList.toggle('active', el.textContent.trim().includes(activeTab));
  });
  showProto(activeTab);
}

/* ---- 显示原型 ---- */
function showProto(menu2) {
  const data = allData;
  if (!data) return;
  let foundItem = null, foundDomain = null;
  outer: for (const [d, items] of Object.entries(data.domains)) {
    for (const item of items) {
      if (item.menu2 === menu2) { foundItem = item; foundDomain = d; break outer; }
    }
  }
  if (!foundItem) return;

  const color = DOMAIN_COLORS[foundDomain] || '#165DFF';
  const t = T[foundItem.type];

  // 页面标题
  document.getElementById('pageBar').style.background = color;
  document.getElementById('pageTitle').textContent = foundItem.menu2;
  document.getElementById('pageTypeBadge').textContent = '● ' + t.cn;
  document.getElementById('pageTypeBadge').className = 'page-type ' + t.cls;

  // iframe
  const frame = document.getElementById('protoFrame');
  const wrap = document.getElementById('iframeWrap');
  if (foundItem.url) {
    frame.src = foundItem.url;
    frame.style.display = 'block';
    const empty = wrap.querySelector('.iframe-empty');
    if (empty) empty.remove();
  } else {
    frame.style.display = 'none';
    let empty = wrap.querySelector('.iframe-empty');
    if (!empty) {
      empty = document.createElement('div');
      empty.className = 'iframe-empty';
      empty.innerHTML = '<div class="big">📄</div><div>原型待生成</div><div style="color:rgba(0,0,0,.15)">此模块的原型尚未生成</div>';
      wrap.appendChild(empty);
    }
  }
}

/* ---- 返回首页 ---- */
function backHome() {
  document.getElementById('detailView').classList.remove('active');
  document.getElementById('homeView').classList.add('active');
  document.getElementById('protoFrame').src = '';
  const wrap = document.getElementById('iframeWrap');
  const empty = wrap.querySelector('.iframe-empty');
  if (empty) empty.remove();
  openTabs = [];
  activeTab = null;
  renderHome();
}

init();
</script>

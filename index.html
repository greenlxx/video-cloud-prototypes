<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频云平台 — 原型导航</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  font-size: 14px;
  color: rgba(0,0,0,.88);
  background: #f0f2f5;
}

/* ===== 顶部栏 ===== */
.topbar {
  background: #165DFF;
  color: #fff;
  height: 48px;
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 12px;
}
.topbar-left { display: flex; align-items: center; gap: 10px; }
.topbar h1 { font-size: 15px; font-weight: 600; }
.version-select {
  background: rgba(255,255,255,.15);
  color: #fff; border: none; border-radius: 4px;
  padding: 4px 10px; font-size: 12px; cursor: pointer;
}
.version-select option { color: #333; background: #fff; }

/* ===== 首页 ===== */
.home { display: none; }
.home.active { display: block; }
.main { max-width: 1200px; margin: 0 auto; padding: 20px; }

/* ===== 图例 ===== */
.legend {
  display: flex; gap: 16px; align-items: center;
  padding: 10px 16px; background: #fff; border-radius: 8px;
  border: 1px solid #f0f0f0; margin-bottom: 20px; font-size: 13px;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.legend-item { display: flex; align-items: center; gap: 6px; }
.badge {
  font-size: 11px; padding: 1px 8px; border-radius: 10px;
  display: inline-block; line-height: 20px;
}
.badge-new { background: #fff2f0; color: #ff4d4f; border: 1px solid #ffccc7; }
.badge-change { background: #fffbe6; color: #d46b08; border: 1px solid #ffe58f; }
.badge-keep { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
.badge-stub { background: #fafafa; color: rgba(0,0,0,.45); border: 1px solid #f0f0f0; }

/* ===== 一级菜单卡片 ===== */
.menu1-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
.menu1-card {
  background: #fff; border-radius: 12px; padding: 20px;
  border: 1px solid #f0f0f0; cursor: pointer;
  transition: all .25s; text-decoration: none; color: inherit;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.menu1-card:hover {
  border-color: var(--hover-color); transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(22,93,255,.1);
}
.m1-top { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.m1-bar { width: 4px; height: 20px; border-radius: 2px; }
.m1-title { font-size: 16px; font-weight: 600; }
.m1-sub { font-size: 12px; color: rgba(0,0,0,.45); margin-left: auto; }
.m1-modules { display: flex; flex-wrap: wrap; gap: 6px; }
.m1-tag {
  font-size: 12px; padding: 3px 10px; border-radius: 6px;
  background: #f5f5f5; color: rgba(0,0,0,.65);
}
.m1-tag.new { background: #fff2f0; color: #ff4d4f; }
.m1-tag.change { background: #fffbe6; color: #d46b08; }
.m1-tag.keep { background: #f6ffed; color: #52c41a; }
.m1-tag.stub { background: #fafafa; color: rgba(0,0,0,.35); }

/* ===== 统计 ===== */
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.stat-card {
  background: #fff; border-radius: 8px; padding: 18px; text-align: center;
  border: 1px solid #f0f0f0;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.stat-num { font-size: 28px; font-weight: 700; }
.stat-label { font-size: 13px; color: rgba(0,0,0,.45); margin-top: 4px; }

/* ================================================================
   内部二级页面（平台布局）
   ================================================================ */
.detail { display: none; height: calc(100vh - 48px); }
.detail.active { display: flex; }

/* 侧边栏 */
.detail-sidebar {
  width: 240px;
  background: #001529;
  color: #fff;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow-y: auto;
}
.ds-header {
  padding: 16px 20px;
  border-bottom: 1px solid rgba(255,255,255,.1);
}
.ds-header .ds-back {
  font-size: 12px; color: rgba(255,255,255,.5); cursor: pointer;
  margin-bottom: 6px; display: inline-block;
}
.ds-header .ds-back:hover { color: #fff; }
.ds-header h2 { font-size: 15px; font-weight: 600; }
.ds-header p { font-size: 12px; color: rgba(255,255,255,.45); margin-top: 2px; }
.ds-section-title {
  font-size: 11px; color: rgba(255,255,255,.35); padding: 12px 20px 4px;
  text-transform: uppercase; letter-spacing: .05em;
}
.ds-item {
  padding: 10px 20px; cursor: pointer; font-size: 13px;
  color: rgba(255,255,255,.75); display: flex; align-items: center; gap: 8px;
  transition: all .15s; border-left: 3px solid transparent;
}
.ds-item:hover { background: rgba(255,255,255,.08); color: #fff; }
.ds-item.active { background: #165DFF; color: #fff; border-left-color: #fff; }
.ds-item .ds-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}

/* 右侧内容区 */
.detail-main {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
}
.dm-content {
  flex: 1; padding: 20px; overflow-y: auto;
}
.dm-breadcrumb { font-size: 12px; color: rgba(0,0,0,.45); margin-bottom: 8px; }
.dm-title { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
.dm-sub { font-size: 14px; color: rgba(0,0,0,.45); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }

/* 文件卡片网格 */
.file-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.file-card {
  display: flex; flex-direction: column;
  background: #fff; border-radius: 8px; padding: 16px;
  border: 1px solid #f0f0f0; text-decoration: none; color: inherit;
  transition: all .2s;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.file-card:hover { border-color: #165DFF; box-shadow: 0 4px 12px rgba(22,93,255,.12); transform: translateY(-1px); }
.fc-icon { font-size: 24px; margin-bottom: 8px; }
.fc-title { font-size: 14px; font-weight: 600; }
.fc-desc { font-size: 12px; color: rgba(0,0,0,.45); margin-top: 2px; }
.fc-badge { margin-top: 8px; align-self: flex-start; }

.empty-files {
  color: rgba(0,0,0,.45); padding: 40px; background: #fff;
  border-radius: 8px; text-align: center; border: 1px solid #f0f0f0;
}

@media (max-width: 900px) { .menu1-grid { grid-template-columns: repeat(2, 1fr); } .file-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 600px) { .menu1-grid { grid-template-columns: 1fr; } .file-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<!-- 顶部栏 -->
<div class="topbar">
  <div class="topbar-left">
    <h1>视频云平台</h1>
    <select class="version-select" id="versionSelect" onchange="switchVersion(this.value)"></select>
  </div>
</div>

<!-- ===== 首页（卡片） ===== -->
<div class="home active" id="homeView">
  <div class="main">
    <div class="legend">
      <div class="legend-item"><span class="badge badge-new">全新</span> 本次新建页面</div>
      <div class="legend-item"><span class="badge badge-change">改造</span> 现有页面优化</div>
      <div class="legend-item"><span class="badge badge-keep">保留</span> 现有功能参考</div>
      <div class="legend-item"><span class="badge badge-stub">占位</span> 后续迭代开发</div>
    </div>

    <div class="menu1-grid" id="menu1Grid"></div>

    <div class="stats" id="statGrid"></div>
  </div>
</div>

<!-- ===== 内部二级页面 ===== -->
<div class="detail" id="detailView">
  <aside class="detail-sidebar" id="detailSidebar"></aside>
  <div class="detail-main">
    <div class="dm-content" id="detailContent">
      <div class="empty-files">选择左侧模块查看原型</div>
    </div>
  </div>
</div>

<script>
// ================================================================
// 🎯 版本配置
// ================================================================
const VERSIONS = {
  "v202606": {
    label: "v202606 · 6月基线版本",
    type: "baseline", date: "2026-06"
  },
  "龙江市监-v202606": {
    label: "龙江市监 · 6月项目版本",
    type: "project", date: "2026-06"
  }
};

const MENU1_COLORS = {
  "平台概览": "#165DFF", "数据治理": "#722ED1", "智能运维": "#13C2C2",
  "轨迹查询": "#1677FF", "布控管理": "#FA8C16", "设备管理": "#52C41A",
  "报警中心": "#FF4D4F", "系统管理": "#86909C"
};

const TYPE_MAP = {
  new:    { cn: "全新",  cls: "badge-new",  dot: "dot-new" },
  change: { cn: "改造",  cls: "badge-change", dot: "dot-change" },
  keep:   { cn: "保留",  cls: "badge-keep",  dot: "dot-keep" },
  stub:   { cn: "占位",  cls: "badge-stub",  dot: "dot-stub" }
};

// ================================================================
// 📦 数据（你改这里）
// ================================================================
const DATA = {
  "v202606": [
    // 数据治理域
    { menu1: "数据治理", menu2: "点位智能标注", icon: "🤖",
      type: "keep",
      files: [
        { name: "标注任务列表", url: "v202606/dg-annotation/list.html" },
        { name: "标注结果详情", url: "v202606/dg-annotation/detail.html" }
      ]},
    { menu1: "数据治理", menu2: "点位治理效能", icon: "📊",
      type: "change",
      files: [{ name: "治理总览", url: "v202606/dg-governance/index.html" }]},
    { menu1: "数据治理", menu2: "标签管理", icon: "🏷️",
      type: "keep",
      files: [{ name: "标签列表", url: "v202606/dg-tag/list.html" }]},
    { menu1: "数据治理", menu2: "基础目录设备管理", icon: "📹",
      type: "change",
      files: [
        { name: "设备列表", url: "v202606/dg-device/list.html" },
        { name: "设备详情", url: "v202606/dg-device/detail.html" }
      ]},
    { menu1: "数据治理", menu2: "业务目录管理", icon: "📁",
      type: "change",
      files: [
        { name: "目录列表", url: "v202606/admin-bdg/list.html" },
        { name: "目录预览", url: "v202606/admin-bdg/preview.html" }
      ]},
    { menu1: "数据治理", menu2: "经纬度治理", icon: "🌐",
      type: "new",
      files: [{ name: "坐标治理页", url: "v202606/dg-coord/index.html" }]},
    // 智能运维
    { menu1: "智能运维", menu2: "检测算法管理", icon: "⚙️",
      type: "change",
      files: [{ name: "算法列表", url: "v202606/ops-algorithm/list.html" }]},
    { menu1: "智能运维", menu2: "巡检任务", icon: "📋",
      type: "change",
      files: [{ name: "任务列表", url: "v202606/ops-inspection/list.html" }]},
    { menu1: "智能运维", menu2: "巡检日志", icon: "📄",
      type: "new",
      files: [{ name: "日志列表", url: "v202606/ops-log/list.html" }]},
    { menu1: "智能运维", menu2: "可用性报告", icon: "📈",
      type: "new",
      files: [{ name: "SLA总览", url: "v202606/ops-sla/index.html" }]},
    { menu1: "智能运维", menu2: "故障预警", icon: "🔮",
      type: "new", files: []},
    { menu1: "智能运维", menu2: "设备告警", icon: "🔔",
      type: "new",
      files: [{ name: "告警列表", url: "v202606/ops-alert/list.html" }]},
    // 轨迹查询
    { menu1: "轨迹查询", menu2: "人员轨迹查询", icon: "👤",
      type: "change",
      files: [
        { name: "搜索页", url: "v202606/track/person-search.html" },
        { name: "结果页", url: "v202606/track/person-result.html" }
      ]},
    { menu1: "轨迹查询", menu2: "车辆轨迹查询", icon: "🚗",
      type: "new", files: []},
    { menu1: "轨迹查询", menu2: "多目标对比", icon: "🔀",
      type: "new", files: []}
  ],
  "龙江市监-v202606": [
    { menu1: "数据治理", menu2: "点位治理效能", icon: "📊",
      type: "new",
      files: [{ name: "部门治理统计", url: "longjiang/dg-governance/index.html" }]},
    { menu1: "数据治理", menu2: "治理进度统计", icon: "📈",
      type: "new",
      files: [{ name: "治理概览", url: "longjiang/dg-progress/index.html" }]}
  ]
};

// ================================================================
// 渲染
// ================================================================
let currentVersion = "v202606";

function init() {
  const sel = document.getElementById('versionSelect');
  sel.innerHTML = Object.entries(VERSIONS).map(([k,v]) =>
    `<option value="${k}">${v.label}</option>`
  ).join('');
  renderHome();
}

function switchVersion(ver) {
  currentVersion = ver;
  document.getElementById('detailView').classList.remove('active');
  document.getElementById('homeView').classList.add('active');
  renderHome();
}

function renderHome() {
  const pages = DATA[currentVersion] || [];
  const verInfo = VERSIONS[currentVersion];

  // 按一级菜单分组
  const groups = {};
  pages.forEach(p => {
    if (!groups[p.menu1]) groups[p.menu1] = { items: [], newCount: 0, changeCount: 0 };
    groups[p.menu1].items.push(p);
    if (p.type === 'new') groups[p.menu1].newCount++;
    if (p.type === 'change') groups[p.menu1].changeCount++;
  });

  // 渲染卡片
  const grid = document.getElementById('menu1Grid');
  const menu1Order = Object.keys(groups);
  grid.innerHTML = menu1Order.map(m1 => {
    const g = groups[m1];
    const color = MENU1_COLORS[m1] || '#165DFF';
    const tags = g.items.map(p => `<span class="m1-tag ${p.type}">${p.icon} ${p.menu2}</span>`).join('');
    const typeTags = [];
    if (g.newCount) typeTags.push(`<span class="badge badge-new">${g.newCount}个全新</span>`);
    if (g.changeCount) typeTags.push(`<span class="badge badge-change">${g.changeCount}个改造</span>`);
    return `
      <div class="menu1-card" style="--hover-color:${color}" onclick="openDetail('${m1}')">
        <div class="m1-top">
          <span class="m1-bar" style="background:${color}"></span>
          <span class="m1-title">${m1}</span>
          <span class="m1-sub">${g.items.length}个模块</span>
        </div>
        <div class="m1-modules">${tags}</div>
        <div style="margin-top:12px;display:flex;gap:8px">${typeTags.join('')}</div>
      </div>
    `;
  }).join('');

  // 统计
  const counts = { new:0, change:0, keep:0, total:0, nav:0 };
  pages.forEach(p => {
    if (p.type !== 'stub') { counts[p.type]++; counts.total++; }
    p.files.forEach(f => { if (f.url) counts.nav++; });
  });
  document.getElementById('statGrid').innerHTML = `
    <div class="stat-card"><div class="stat-num" style="color:#ff4d4f;">${counts.new}</div><div class="stat-label">全新模块</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#faad14;">${counts.change}</div><div class="stat-label">改造模块</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#165DFF;">${counts.total}</div><div class="stat-label">迭代模块</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#52c41a;">${counts.nav}</div><div class="stat-label">可导航文件</div></div>
  `;
}

function openDetail(menu1) {
  const pages = DATA[currentVersion] || [];
  const items = pages.filter(p => p.menu1 === menu1);
  if (!items.length) return;

  // 切换视图
  document.getElementById('homeView').classList.remove('active');
  const dv = document.getElementById('detailView');
  dv.classList.add('active');

  // 侧边栏
  const color = MENU1_COLORS[menu1] || '#165DFF';
  const sidebar = document.getElementById('detailSidebar');
  sidebar.innerHTML = `
    <div class="ds-header">
      <span class="ds-back" onclick="backToHome()">← 返回首页</span>
      <h2 style="color:${color}">${menu1}</h2>
      <p>${items.length}个模块 · ${items.filter(i => i.type==='new').length}全新 ${items.filter(i => i.type==='change').length}改造</p>
    </div>
    ${items.map((p, i) => `
      <div class="ds-item ${i===0?'active':''}" onclick="showModule(${i})">
        <span class="ds-dot ${TYPE_MAP[p.type].dot}"></span>
        <span>${p.menu2}</span>
      </div>
    `).join('')}
  `;

  // 默认选中第一个
  window._detailItems = items;
  window._currentIdx = 0;
  showModule(0);
}

function showModule(idx) {
  const items = window._detailItems;
  const p = items[idx];
  window._currentIdx = idx;

  document.querySelectorAll('.ds-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });

  const t = TYPE_MAP[p.type];
  const color = MENU1_COLORS[p.menu1] || '#165DFF';
  const content = document.getElementById('detailContent');
  content.innerHTML = `
    <div style="margin-bottom:20px">
      <div class="dm-breadcrumb"><span style="color:${color};font-weight:600">${p.menu1}</span> / ${p.menu2}</div>
      <div class="dm-title">${p.icon} ${p.menu2}</div>
      <div class="dm-sub">本迭代标记：<span class="badge ${t.cls}">${t.cn}</span></div>
    </div>
    <div style="margin-bottom:16px">
      <span style="font-size:13px;color:rgba(0,0,0,.45)">📂 共 ${p.files.length} 个原型文件</span>
    </div>
    ${p.files.length > 0 ? `
      <div class="file-grid">
        ${p.files.map(f => `
          <a href="${f.url || '#'}" class="file-card" ${f.url ? 'target="_blank"' : 'onclick="return false"'}>
            <div class="fc-icon">📄</div>
            <div class="fc-title">${f.name}</div>
            <div class="fc-desc">${f.url || '待生成'}</div>
            <span class="fc-badge badge ${t.cls}">${t.cn}</span>
          </a>
        `).join('')}
      </div>
    ` : `<div class="empty-files">此模块的原型尚未生成</div>`}
  `;
}

function backToHome() {
  document.getElementById('detailView').classList.remove('active');
  document.getElementById('homeView').classList.add('active');
  renderHome();
}

init();
</script>
</body>
</html>

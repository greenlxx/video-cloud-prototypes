<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频云平台 — 原型导航</title>
<style>
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  font-size: 14px;
  color: #1a1a2e;
  background: #f5f6fa;
  -webkit-font-smoothing: antialiased;
}

/* 顶部栏 */
.topbar {
  background: #001529;
  color: #fff;
  height: 52px;
  display: flex;
  align-items: center;
  padding: 0 28px;
  gap: 16px;
}
.topbar .logo {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: .02em;
}
.topbar .logo span { color: #4895ff; }
.ver-select {
  background: rgba(255,255,255,.1);
  color: #c8d6e5;
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 6px;
  padding: 4px 12px;
  font-size: 12px;
  cursor: pointer;
  margin-left: auto;
}
.ver-select:focus { outline: none; border-color: #4895ff; }
.ver-select option { color: #1a1a2e; background: #fff; }

/* 首页容器 */
.home { display: none; }
.home.active { display: block; }
.home-scroll { overflow-y: auto; height: calc(100vh - 52px); }
.main { max-width: 1200px; margin: 0 auto; padding: 28px; }

/* ===== 概览统计 — Editorial/Magazine 风格 ===== */
.overview { display: grid; grid-template-columns: repeat(4,1fr); gap: 1px; margin-bottom: 32px; background: #e9ecf2; border-radius: 10px; overflow: hidden; }
.ov-card { background: #fff; padding: 24px 16px; position: relative; text-align: center; }
.ov-card::after {
  content: ''; position: absolute; top: 0; left: 0;
  width: 100%; height: 3px;
}
.ov-card:nth-child(1)::after { background: #ff4d4f; }
.ov-card:nth-child(2)::after { background: #faad14; }
.ov-card:nth-child(3)::after { background: #165DFF; }
.ov-card:nth-child(4)::after { background: #52c41a; }
.ov-num { font-size: 34px; font-weight: 700; line-height: 1; }
.ov-label { font-size: 13px; color: #6b7280; margin-top: 4px; }
.ov-sub { font-size: 11px; color: #9ca3af; margin-top: 2px; }

/* ===== 图例 ===== */
.legend {
  display: flex; gap: 28px; align-items: center;
  margin-bottom: 32px; padding: 0 4px;
}
.legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #6b7280; }
.ldot { width: 8px; height: 8px; border-radius: 50%; }
.ldot.n { background: #ff4d4f; box-shadow: 0 0 0 2px rgba(255,77,79,.2); }
.ldot.c { background: #faad14; box-shadow: 0 0 0 2px rgba(250,173,20,.2); }
.ldot.k { background: #52c41a; box-shadow: 0 0 0 2px rgba(82,196,26,.2); }

/* ===== 域分组 ===== */
.domain { margin-bottom: 36px; }
.dhd {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 16px;
}
.dbar { width: 4px; height: 22px; border-radius: 2px; flex-shrink: 0; }
.dhd h2 { font-size: 18px; font-weight: 600; color: #1a1a2e; }
.dhd .sub { font-size: 12px; color: #9ca3af; }
.dhd .tags { margin-left: auto; display: flex; gap: 14px; font-size: 11px; }
.dtags { display: flex; align-items: center; gap: 4px; color: #6b7280; }

/* ===== 卡片 — 干净左竖条风格 ===== */
.cards { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
.card {
  display: flex; flex-direction: column;
  background: #fff;
  border-radius: 10px;
  padding: 20px;
  cursor: pointer;
  transition: all .25s ease;
  position: relative;
  overflow: hidden;
  box-shadow: 0 1px 3px rgba(0,0,0,.04);
}
.card::before {
  content: ''; position: absolute; top: 0; left: 0;
  width: 100%; height: 3px;
  transition: height .2s ease;
}
.card:hover { box-shadow: 0 8px 30px rgba(0,0,0,.08); transform: translateY(-2px); }
.card:hover::before { height: 4px; }
.cat { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 12px; }
.cicon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
.cb { flex: 1; min-width: 0; }
.ctit { font-size: 15px; font-weight: 600; color: #1a1a2e; }
.cdesc { font-size: 12px; color: #6b7280; margin-top: 3px; line-height: 1.4; }
.cbadge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; padding: 2px 10px; border-radius: 12px;
  font-weight: 500; white-space: nowrap;
  flex-shrink: 0; margin-left: auto;
}
.cbadge.n { background: #fff1f0; color: #cf1322; }
.cbadge.c { background: #fffbe6; color: #d48806; }
.cbadge.k { background: #f6ffed; color: #389e0d; }
.cbot { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #9ca3af; margin-top: auto; padding-top: 12px; border-top: 1px solid #f0f0f0; }

/* ===== 原型内页 ===== */
.detail { display: none; height: 100vh; flex-direction: column; background: #f5f6fa; }
.detail.active { display: flex; }
.dtop {
  background: #fff; color: #1a1a2e;
  height: 52px; display: flex; align-items: center;
  padding: 0 28px; gap: 12px; flex-shrink: 0;
  border-bottom: 1px solid #e9ecf2;
  box-shadow: 0 1px 3px rgba(0,0,0,.04);
}
.dtop .back {
  background: #f5f6fa; border: none; color: #6b7280;
  width: 32px; height: 32px; border-radius: 8px;
  cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.dtop .back:hover { background: #e9ecf2; color: #1a1a2e; }
.dtop .brand { font-size: 15px; font-weight: 600; color: #165DFF; }
.ibody { display: flex; flex: 1; overflow: hidden; }
.iside {
  width: 240px; background: #fff; border-right: 1px solid #e9ecf2;
  display: flex; flex-direction: column; flex-shrink: 0;
  overflow-y: auto; padding: 8px 0;
}
.isec { padding: 14px 20px 6px; font-size: 10px; color: #9ca3af; text-transform: uppercase; letter-spacing: .06em; font-weight: 600; }
.iitem {
  padding: 10px 20px; cursor: pointer; font-size: 13px;
  color: #6b7280; display: flex; align-items: center; gap: 8px;
  transition: all .12s; border-left: 3px solid transparent;
}
.iitem:hover { background: #f5f6fa; color: #1a1a2e; }
.iitem.active { background: #eef3ff; color: #165DFF; border-left-color: #165DFF; font-weight: 500; }
.idot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.idot.n { background: #ff4d4f; }
.idot.c { background: #faad14; }
.idot.k { background: #52c41a; }
.imain { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #f5f6fa; }
.page-hd { padding: 20px 28px 0; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.page-bar { width: 3px; height: 18px; border-radius: 2px; flex-shrink: 0; }
.page-title { font-size: 18px; font-weight: 600; color: #1a1a2e; }
.page-badge { font-size: 11px; padding: 2px 10px; border-radius: 12px; }
.page-badge.n { background: #fff1f0; color: #cf1322; }
.page-badge.c { background: #fffbe6; color: #d48806; }
.page-badge.k { background: #f6ffed; color: #389e0d; }
.iframe-wrap { flex: 1; margin: 14px 28px 20px; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.04); position: relative; }
.iframe-wrap iframe { width: 100%; height: 100%; border: none; }
.iframe-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #9ca3af; gap: 8px; font-size: 14px; }
.iframe-empty .big { font-size: 40px; }

@media (max-width: 900px) { .cards { grid-template-columns: repeat(2,1fr); } .iside { width: 200px; } }
@media (max-width: 600px) { .cards { grid-template-columns: 1fr; } .overview { grid-template-columns: repeat(2,1fr); } .iside { display: none; } }
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="logo">视频云<span>平台</span></div>
    <select class="ver-select" id="versionSelect" onchange="switchVer(this.value)"></select>
  </div>
</div>

<div class="home active" id="homeView">
  <div class="home-scroll">
    <div class="main">
      <div class="overview" id="overviewGrid"></div>
      <div class="legend">
        <span class="legend-item"><span class="ldot n"></span>全新 — 本期新建</span>
        <span class="legend-item"><span class="ldot c"></span>改造 — 本期优化</span>
        <span class="legend-item"><span class="ldot k"></span>保留 — 现有展示</span>
      </div>
      <div id="homeCards"></div>
    </div>
  </div>
</div>

<div class="detail" id="detailView">
  <div class="dtop">
    <button class="back" onclick="backHome()">←</button>
    <span class="brand">视频云平台</span>
  </div>
  <div class="ibody">
    <aside class="iside" id="detailSidebar"></aside>
    <div class="imain">
      <div class="page-hd"><span class="page-bar" id="pageBar" style="background:#722ED1"></span><span class="page-title" id="pageTitle">点位智能标注</span><span class="page-badge" id="pageBadge">保留</span></div>
      <div class="iframe-wrap" id="iframeWrap"><iframe id="protoFrame" allowfullscreen></iframe></div>
    </div>
  </div>
</div>

<script>
const VERSIONS = { "v202606": { label:"v202606 · 6月基线" }, "龙江市监-v202606": { label:"龙江市监 · 6月项目" } };
const DC = { "数据治理":"#722ED1", "智能运维":"#13C2C2", "轨迹查询":"#1677FF", "布控管理":"#FA8C16", "设备管理":"#52C41A", "报警中心":"#FF4D4F", "系统管理":"#86909C" };
const T = { n:"全新", c:"改造", k:"保留", s:"占位" };
const TC = { n:"n", c:"c", k:"k" };

const DATA = {
  "v202606": {
    domains: {
      "数据治理": [
        {m:"点位智能标注",i:"🤖",b:"#f5f0ff",t:"k",d:"Epic-G · 业务标签智能标注",p:"list + detail",u:""},
        {m:"点位治理效能",i:"📊",b:"#e6fffb",t:"c",d:"Epic-H · 部门治理效能",p:"index",u:""},
        {m:"标签管理",i:"🏷️",b:"#f0f5ff",t:"k",d:"Epic-I · 标签管理视图",p:"list",u:""},
        {m:"基础目录设备管理",i:"📹",b:"#fff7e6",t:"c",d:"Epic-J · 批量配置",p:"list + detail",u:""},
        {m:"业务目录管理",i:"📁",b:"#f0f5ff",t:"c",d:"Epic-K · 6种生成规则",p:"list + preview",u:""},
        {m:"经纬度治理",i:"🌐",b:"#fff1f0",t:"n",d:"Epic-L · 坐标补全",p:"index · 地图",u:""}
      ],
      "智能运维": [
        {m:"检测算法管理",i:"⚙️",b:"#f0f5ff",t:"c",d:"Epic-A · 算法库",p:"list",u:""},
        {m:"巡检任务",i:"📋",b:"#fff0f6",t:"c",d:"Epic-B · 多维巡检",p:"list + create + detail",u:""},
        {m:"巡检日志",i:"📄",b:"#f6ffed",t:"n",d:"Epic-C · 链路日志",p:"list + detail",u:""},
        {m:"可用性报告",i:"📈",b:"#e6fffb",t:"n",d:"Epic-D · SLA大盘",p:"index",u:""},
        {m:"故障预警",i:"🔮",b:"#f0f5ff",t:"n",d:"Epic-E · 模型预判",p:"2个页面",u:""},
        {m:"设备告警",i:"🔔",b:"#fff1f0",t:"n",d:"Epic-F · 告警处置",p:"list + detail",u:""}
      ],
      "轨迹查询": [
        {m:"人员轨迹查询",i:"👤",b:"#f0faff",t:"c",d:"以图搜人 / 文本搜人",p:"搜索 + 结果",u:""},
        {m:"车辆轨迹查询",i:"🚗",b:"#f6ffed",t:"n",d:"以图搜车 / 车牌号",p:"搜索 + 结果",u:""},
        {m:"多目标对比",i:"🔀",b:"#fff7e6",t:"n",d:"轨迹叠加 / 同行检测",p:"独立页面",u:""}
      ]
    }
  },
  "龙江市监-v202606": {
    domains: {
      "数据治理": [
        {m:"点位治理效能",i:"📊",b:"#e6fffb",t:"n",d:"治理效能总览",p:"index",u:""},
        {m:"治理进度统计",i:"📈",b:"#f0f5ff",t:"n",d:"治理进度概览",p:"index",u:""}
      ]
    }
  }
};

let curVer = "v202606", allData = {}, curItems = [], curDomain = "";

function init() {
  document.getElementById('versionSelect').innerHTML = Object.entries(VERSIONS).map(([k,v])=>`<option value="${k}">${v.label}</option>`).join('');
  renderHome();
}
function switchVer(v){ curVer=v; backHome(); }

function renderHome() {
  const data=DATA[curVer]; if(!data) return;
  allData = data; const ds = data.domains;
  let nN=0,nC=0,nK=0,nM=0,nU=0;
  Object.values(ds).forEach(items=>{items.forEach(p=>{nM++;if(p.t==='n')nN++;else if(p.t==='c')nC++;else if(p.t==='k')nK++;if(p.u)nU++;});});

  document.getElementById('overviewGrid').innerHTML = `
    <div class="ov-card"><div class="ov-num" style="color:#ff4d4f">${nN}</div><div class="ov-label">全新模块</div><div class="ov-sub">本期新增</div></div>
    <div class="ov-card"><div class="ov-num" style="color:#faad14">${nC}</div><div class="ov-label">改造模块</div><div class="ov-sub">本期优化</div></div>
    <div class="ov-card"><div class="ov-num" style="color:#165DFF">${nM}</div><div class="ov-label">迭代模块</div><div class="ov-sub">本期范围</div></div>
    <div class="ov-card"><div class="ov-num" style="color:#52c41a">${nU}</div><div class="ov-label">可预览</div><div class="ov-sub">已生成原型</div></div>`;

  let html='';
  Object.entries(ds).forEach(([d,items])=>{
    const cl = DC[d]||'#165DFF';
    const dn = items.filter(i=>i.t==='n').length;
    const dc = items.filter(i=>i.t==='c').length;
    html+=`<div class="domain"><div class="dhd"><span class="dbar" style="background:${cl}"></span><h2>${d}</h2><span class="sub">${items.length}个模块</span><div class="tags">${dn?`<span class="dtags"><span class="ldot n"></span>${dn}个全新</span>`:''}${dc?`<span class="dtags"><span class="ldot c"></span>${dc}个改造</span>`:''}</div></div><div class="cards">`;
    items.forEach(p=>{
      const tc = p.t in TC ? TC[p.t] : 'k';
      html+=`<div class="card" onclick="openDetail('${d}','${p.m}')" style="border-top-color:transparent"><div class="cat"><div class="cicon" style="background:${p.b}">${p.i}</div><div class="cb"><div class="ctit">${p.m}</div><div class="cdesc">${p.d}</div></div><span class="cbadge ${tc}">● ${T[p.t]||'占位'}</span></div><div class="cbot"><span>📄 ${p.p}</span></div></div>`;
    });
    html+='</div></div>';
  });
  document.getElementById('homeCards').innerHTML = html;
}

function openDetail(d,m) {
  document.getElementById('homeView').classList.remove('active');
  document.getElementById('detailView').classList.add('active');
  if(!allData||!allData.domains) allData=DATA[curVer];
  curDomain = d;
  const items = allData.domains[d]||[];
  curItems = items;
  const p = items.find(x=>x.m===m);
  const cl = DC[d]||'#165DFF';

  // 侧边栏
  let html='';
  Object.entries(allData.domains).forEach(([dn,its])=>{
    const cl2 = DC[dn]||'#165DFF';
    html+=`<div class="isec" style="color:${cl2}">${dn}</div>`;
    its.forEach(it=>{
      const tc = it.t in TC ? TC[it.t] : 'k';
      html+=`<div class="iitem ${it.m===m?'active':''}" onclick="switchPage('${it.m}')"><span class="idot ${tc}"></span>${it.m}</div>`;
    });
  });
  document.getElementById('detailSidebar').innerHTML = html;

  // 页面标题
  document.getElementById('pageBar').style.background = cl;
  document.getElementById('pageTitle').textContent = m;
  const tc = p&&p.t in TC ? TC[p.t] : 'k';
  document.getElementById('pageBadge').textContent = '● '+(T[p?.t]||'占位');
  document.getElementById('pageBadge').className = 'page-badge '+tc;

  // iframe
  const frame = document.getElementById('protoFrame');
  const wrap = document.getElementById('iframeWrap');
  const oldEmpty = wrap.querySelector('.iframe-empty');
  if(oldEmpty) oldEmpty.remove();
  if(p&&p.u) { frame.src=p.u; frame.style.display='block'; }
  else {
    frame.style.display='none';
    const emp=document.createElement('div'); emp.className='iframe-empty';
    emp.innerHTML='<div class="big">📄</div><div>原型待生成</div>'; wrap.appendChild(emp);
  }
}

function switchPage(m) {
  const items = allData.domains[curDomain]||[];
  const p = items.find(x=>x.m===m);
  if(!p) return;
  const cl = DC[curDomain]||'#165DFF';
  document.getElementById('pageBar').style.background = cl;
  document.getElementById('pageTitle').textContent = m;
  const tc = p.t in TC ? TC[p.t] : 'k';
  document.getElementById('pageBadge').textContent = '● '+(T[p.t]||'占位');
  document.getElementById('pageBadge').className = 'page-badge '+tc;

  const active = document.querySelectorAll('.iitem');
  if(active) active.forEach(el=>el.classList.toggle('active',el.textContent.trim()===m));

  const frame = document.getElementById('protoFrame');
  const wrap = document.getElementById('iframeWrap');
  const oldEmpty = wrap.querySelector('.iframe-empty');
  if(oldEmpty) oldEmpty.remove();
  if(p.u) { frame.src=p.u; frame.style.display='block'; }
  else { frame.style.display='none'; const emp=document.createElement('div'); emp.className='iframe-empty'; emp.innerHTML='<div class="big">📄</div><div>原型待生成</div>'; wrap.appendChild(emp); }
}

function backHome() {
  document.getElementById('detailView').classList.remove('active');
  document.getElementById('homeView').classList.add('active');
  document.getElementById('protoFrame').src='';
  const wrap = document.getElementById('iframeWrap');
  const oldEmpty = wrap.querySelector('.iframe-empty');
  if(oldEmpty) oldEmpty.remove();
  renderHome();
}
init();
</script>
</body>
</html>

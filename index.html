<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频云平台 — 原型总览</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f5f5f5;
    color: rgba(0,0,0,0.88);
    display: flex;
    min-height: 100vh;
  }
  .sidebar {
    width: 240px;
    background: #001529;
    color: #fff;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow-y: auto;
  }
  .sidebar-header {
    padding: 16px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .sidebar-header h1 { font-size: 16px; font-weight: 600; color: #fff; }
  .sidebar-header p { font-size: 12px; color: rgba(255,255,255,0.45); margin-top: 4px; }
  .sidebar-section { padding: 12px 0; }
  .sidebar-section-title {
    font-size: 12px; color: rgba(255,255,255,0.45);
    padding: 4px 20px; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .nav-item {
    padding: 8px 20px; cursor: pointer; font-size: 14px;
    color: rgba(255,255,255,0.85); display: flex; align-items: center;
    gap: 8px; transition: all 0.15s; border-left: 3px solid transparent;
  }
  .nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .nav-item.active { background: #165DFF; color: #fff; border-left-color: #fff; }
  .nav-item .badge { font-size: 11px; padding: 1px 6px; border-radius: 10px; margin-left: auto; }
  .badge-new { background: #F6FFED; color: #52C41A; }
  .badge-update { background: #FFF7E6; color: #D46B08; }
  .badge-keep { background: #E6F4FF; color: #165DFF; }
  .main { flex: 1; display: flex; flex-direction: column; }
  .topbar {
    height: 48px; background: #165DFF; display: flex; align-items: center;
    padding: 0 20px; color: #fff; gap: 12px;
  }
  .topbar .product-name { font-size: 14px; font-weight: 500; }
  .topbar .page-title { font-size: 13px; opacity: 0.8; margin-left: auto; }
  .content {
    flex: 1; padding: 0; display: flex; flex-direction: column;
  }
  .content iframe {
    width: 100%; height: 100%; border: none;
    display: none; position: absolute; top: 0; left: 0;
  }
  .content iframe.active { display: block; }
  .preview-container {
    flex: 1; position: relative; overflow: hidden;
  }
  .empty-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100%; gap: 12px;
    color: rgba(0,0,0,0.45);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state h2 { font-size: 18px; color: rgba(0,0,0,0.88); margin-bottom: 8px; }
  .empty-state p { font-size: 14px; max-width: 400px; line-height: 1.6; }
</style>
</head>
<body>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1>视频云平台</h1>
    <p>v1.0 · 原型总览</p>
  </div>
  <div class="sidebar-section" id="navList"></div>
</div>
<div class="main">
  <div class="topbar">
    <span class="product-name">视频云平台</span>
    <span class="page-title" id="currentPage">选择左侧页面查看原型</span>
  </div>
  <div class="content">
    <div class="empty-state" id="emptyState">
      <div class="icon">📋</div>
      <h2>选择左侧页面查看原型</h2>
      <p>通过左侧导航栏查看本期迭代的页面原型。</p>
    </div>
    <div class="preview-container">
      <iframe id="previewFrame"></iframe>
    </div>
  </div>
</div>
<script>
const PAGES = [
  { name: "概览", items: [
    { label: "平台迭代总览", type: "new", url: "" }
  ]},
  { name: "数据治理域", items: [
    { label: "点位智能标注", type: "new", url: "" },
    { label: "点位治理效能", type: "new", url: "" },
    { label: "标签管理", type: "update", url: "" },
    { label: "基础目录设备管理", type: "update", url: "" }
  ]},
  { name: "智能运维域", items: [
    { label: "故障预警", type: "new", url: "" },
    { label: "设备告警", type: "new", url: "" },
    { label: "检测算法管理", type: "update", url: "" },
    { label: "巡检任务", type: "update", url: "" },
    { label: "巡检日志", type: "new", url: "" },
    { label: "可用性报告", type: "new", url: "" }
  ]},
  { name: "轨迹查询", items: [
    { label: "人员轨迹查询", type: "update", url: "" },
    { label: "车辆轨迹查询", type: "new", url: "" },
    { label: "多目标对比", type: "new", url: "" },
    { label: "视频预览", type: "new", url: "" }
  ]},
  { name: "布控管理", items: [
    { label: "目标库", type: "update", url: "" },
    { label: "布控任务", type: "update", url: "" },
    { label: "布控告警", type: "update", url: "" }
  ]}
];
const TYPE_MAP = { new: { label: "新增", cls: "badge-new" }, update: { label: "优化", cls: "badge-update" }, keep: { label: "保留", cls: "badge-keep" } };
function renderNav() {
  document.getElementById('navList').innerHTML = PAGES.map(g => `
    <div class="sidebar-section-title">${g.name}</div>
    ${g.items.map(i => `
      <div class="nav-item" data-url="${i.url}" data-label="${i.label}" onclick="openPage(this)">
        <span>${i.label}</span>
        <span class="badge ${TYPE_MAP[i.type].cls}">${TYPE_MAP[i.type].label}</span>
      </div>
    `).join('')}
  `).join('');
}
function openPage(el) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('currentPage').textContent = el.dataset.label;
  const frame = document.getElementById('previewFrame');
  const empty = document.getElementById('emptyState');
  if (el.dataset.url) {
    frame.src = el.dataset.url;
    frame.classList.add('active');
    empty.style.display = 'none';
    document.querySelector('.preview-container').style.display = 'block';
  } else {
    frame.classList.remove('active');
    frame.src = '';
    empty.style.display = 'flex';
    empty.querySelector('h2').textContent = '原型待生成';
    empty.querySelector('p').textContent = '"' + el.dataset.label + '" 的原型尚未生成。';
  }
}
renderNav();
</script>
</body>
</html>

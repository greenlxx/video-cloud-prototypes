<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>更新预览 - 业务目录管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    :root {
      --ant-primary: #1677ff;
      --ant-success: #52c41a;
      --ant-error: #ff4d4f;
      --ant-bg: #f5f5f5;
      --ant-border: #d9d9d9;
      --ant-border-secondary: #f0f0f0;
      --ant-text: rgba(0, 0, 0, 0.88);
      --ant-text-secondary: rgba(0, 0, 0, 0.65);
      --ant-text-tertiary: rgba(0, 0, 0, 0.45);
      --ant-bg-container: #fff;
      --radius: 8px;
      --shadow: 0 3px 6px -4px rgba(0,0,0,.12),0 6px 16px 0 rgba(0,0,0,.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--ant-bg);
      color: var(--ant-text);
      font: 14px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    .page { max-width: 800px; margin: 0 auto; padding: 20px; }
    .card {
      background: var(--ant-bg-container);
      border: 1px solid var(--ant-border-secondary);
      border-radius: var(--radius);
      box-shadow: 0 1px 2px rgba(0,0,0,.03);
    }
    .header { padding: 14px 18px; border-bottom: 1px solid var(--ant-border-secondary); }
    .title { margin: 0; font-size: 18px; font-weight: 600; }
    .subtitle { margin: 4px 0 0; color: var(--ant-text-tertiary); font-size: 12px; }
    .btn {
      height: 32px;
      padding: 0 14px;
      border: 1px solid var(--ant-border);
      border-radius: 6px;
      background: #fff;
      color: var(--ant-text);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn:hover { border-color: var(--ant-primary); color: var(--ant-primary); }
    .btn-primary { background: var(--ant-primary); color: #fff; border-color: var(--ant-primary); }
    .btn-primary:hover { opacity: .92; color: #fff; }
    .tag {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 8px;
      border-radius: 4px;
      font-size: 12px;
      border: 1px solid #b7eb8f;
      color: #389e0d;
      background: #f6ffed;
    }
    .metric-card {
      border-radius: 12px;
      padding: 32px 24px;
      text-align: center;
      flex: 1;
    }
    .metric-card .metric-label {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 12px;
    }
    .metric-card .metric-value {
      font-size: 48px;
      font-weight: 700;
      line-height: 1;
    }
    .metric-add {
      background: linear-gradient(135deg, #f6ffed 0%, #d9f7be 100%);
      border: 2px solid #b7eb8f;
    }
    .metric-add .metric-label { color: #389e0d; }
    .metric-add .metric-value { color: #52c41a; }
    .metric-remove {
      background: linear-gradient(135deg, #fff2f0 0%, #ffccc7 100%);
      border: 2px solid #ffa39e;
    }
    .metric-remove .metric-label { color: #cf1322; }
    .metric-remove .metric-value { color: #ff4d4f; }
    .foot-actions {
      position: sticky;
      bottom: 0;
      z-index: 20;
      margin-top: 24px;
      background: rgba(255,255,255,.95);
      border: 1px solid var(--ant-border-secondary);
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      box-shadow: var(--shadow);
    }
    .msg {
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 99;
      display: none;
      background: #fff;
      border-left: 4px solid var(--ant-success);
      padding: 9px 12px;
      border-radius: 8px;
      box-shadow: var(--shadow);
      font-size: 13px;
    }
    .mask {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .mask.active { display: flex; }
    .modal {
      width: min(420px, 92vw);
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .modal-hd, .modal-ft { padding: 14px 16px; border-bottom: 1px solid var(--ant-border-secondary); }
    .modal-ft { border-bottom: 0; border-top: 1px solid var(--ant-border-secondary); display: flex; justify-content: flex-end; gap: 8px; }
    .modal-bd { padding: 16px; color: var(--ant-text-secondary); line-height: 1.8; }
  </style>
</head>
<body>
  <div class="msg" id="msg"></div>

  <div class="page space-y-4">
    <!-- 标题区 -->
    <div class="flex items-center justify-between">
      <div>
        <h1 class="title">更新预览</h1>
        <p class="subtitle">确认设备变更后，点击"确认更新"写入业务目录。</p>
      </div>
      <div class="flex items-center gap-3">
        <span class="tag" id="ruleIdTag">规则ID：-</span>
        <button class="btn" onclick="goList()"><i class="fa-solid fa-arrow-left"></i> 返回列表</button>
      </div>
    </div>

    <!-- 核心指标区 -->
    <div class="card" style="padding: 32px 24px;">
      <div class="flex items-center justify-between gap-6">
        <div class="metric-card metric-add">
          <div class="metric-label">新增设备</div>
          <div class="metric-value" id="addCount">156</div>
        </div>
        <div class="metric-card metric-remove">
          <div class="metric-label">减少设备</div>
          <div class="metric-value" id="removeCount">23</div>
        </div>
      </div>
      <div class="text-center mt-4" style="color:var(--ant-text-tertiary); font-size:12px;">
        最近刷新：<span id="lastRefresh">-</span>
      </div>
    </div>

    <!-- 底部操作栏 -->
    <div class="foot-actions">
      <button class="btn" onclick="goList()">取消</button>
      <button class="btn btn-primary" onclick="confirmUpdate()">确认更新</button>
    </div>
  </div>

  <script>
    const qs = new URLSearchParams(location.search);
    const state = {
      ruleId: qs.get('ruleId') || '-'
    };

    function init() {
      document.getElementById('ruleIdTag').textContent = `规则ID：${state.ruleId}`;
      stampRefreshTime();
    }

    function stampRefreshTime() {
      const now = new Date();
      const t = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
      document.getElementById('lastRefresh').textContent = t;
    }

    function goList() {
      location.href = 'list.html';
    }

    function confirmUpdate() {
      flash('更新提交成功，正在返回列表');
      setTimeout(() => {
        location.href = `list.html?updatedRuleId=${encodeURIComponent(state.ruleId)}`;
      }, 500);
    }

    function flash(text) {
      const box = document.getElementById('msg');
      box.textContent = text;
      box.style.display = 'block';
      clearTimeout(window.__msgTimer);
      window.__msgTimer = setTimeout(() => { box.style.display = 'none'; }, 1400);
    }

    init();
  </script>
</body>
</html>

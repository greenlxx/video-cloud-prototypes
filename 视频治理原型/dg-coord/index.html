<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>经纬度治理 - 视频智能运维管理平台</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ========== CSS Variables ========== */
:root {
  --ant-primary: #1677ff; --ant-primary-hover: #4096ff; --ant-primary-bg: #e6f4ff;
  --ant-success: #52c41a; --ant-warning: #faad14; --ant-error: #ff4d4f;
  --ant-text: rgba(0,0,0,.88); --ant-text-secondary: rgba(0,0,0,.65); --ant-text-tertiary: rgba(0,0,0,.45);
  --ant-border: #d9d9d9; --ant-border-secondary: #f0f0f0;
  --shadow-1: 0 1px 2px rgba(0,0,0,.03),0 1px 6px -1px rgba(0,0,0,.02);
  --shadow-2: 0 3px 6px -4px rgba(0,0,0,.12),0 6px 16px rgba(0,0,0,.08);
  --shadow-float: 0 8px 24px rgba(0,0,0,.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,'Noto Sans',sans-serif;font-size:14px;color:var(--ant-text);background:#f5f5f5;line-height:1.5715;overflow:hidden;height:100vh;}

/* ========== Header ========== */
.header{height:56px;background:#001529;display:flex;align-items:center;padding:0 20px;gap:16px;}
.header .logo{display:flex;align-items:center;gap:10px;color:#fff;font-size:15px;font-weight:600;}
.header .logo i{color:var(--ant-primary);font-size:20px;}
.header .header-right{margin-left:auto;display:flex;align-items:center;gap:14px;color:rgba(255,255,255,.85);font-size:13px;}
.header-stat{display:flex;align-items:center;gap:6px;}
.header-stat .dot{width:8px;height:8px;border-radius:50%;background:var(--ant-warning);}

/* ========== Layout ========== */
.main{display:flex;height:calc(100vh - 56px);}
.sidebar{width:220px;background:#001529;flex-shrink:0;overflow-y:auto;padding-top:4px;}
.menu-group-title{padding:12px 20px 4px;font-size:11px;color:rgba(255,255,255,.35);letter-spacing:1px;}
.menu-item{display:flex;align-items:center;gap:10px;height:40px;padding:0 20px;color:rgba(255,255,255,.65);cursor:pointer;font-size:13px;border-left:3px solid transparent;}
.menu-item:hover{color:#fff;background:rgba(255,255,255,.08);}
.menu-item.active{color:#fff;background:var(--ant-primary);border-left-color:var(--ant-primary);}
.menu-item i{width:16px;text-align:center;}

/* ========== Left Panel ========== */
.left-panel{width:280px;background:#fff;border-right:1px solid var(--ant-border-secondary);flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;}
.panel-hd{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--ant-border-secondary);font-size:14px;font-weight:600;flex-shrink:0;}
.panel-hd .cat-switch{font-size:12px;font-weight:400;color:var(--ant-text-secondary);cursor:pointer;margin-left:auto;}
.panel-hd .cat-switch:hover{color:var(--ant-primary);}
.panel-hd .cat-dropdown{display:none;margin-top:4px;width:100%;}
.panel-hd .cat-dropdown.show{display:block;}
.panel-hd .cat-dropdown select{width:100%;height:28px;padding:0 8px;border:1px solid var(--ant-border);border-radius:4px;font-size:12px;outline:none;}

.tab-bar{display:flex;padding:0 12px;border-bottom:1px solid var(--ant-border-secondary);flex-shrink:0;}
.tab-item{padding:8px 12px;font-size:13px;color:var(--ant-text-secondary);border-bottom:2px solid transparent;cursor:pointer;transition:.2s;margin-bottom:-1px;}
.tab-item:hover{color:var(--ant-primary);}
.tab-item.active{color:var(--ant-primary);border-bottom-color:var(--ant-primary);font-weight:500;}
.tab-item .tab-count{margin-left:4px;font-size:11px;padding:1px 6px;border-radius:8px;background:#f5f5f5;}
.tab-item.active .tab-count{background:var(--ant-primary-bg);}

.tree{flex:1;overflow-y:auto;padding:6px 0;}
.tree-node{cursor:pointer;user-select:none;}
.tree-row{display:flex;align-items:center;gap:6px;padding:5px 12px;transition:background .15s;}
.tree-row:hover{background:rgba(0,0,0,.04);}
.tree-row.selected{background:var(--ant-primary-bg);color:var(--ant-primary);}
.tree-arr{width:14px;text-align:center;font-size:10px;color:var(--ant-text-tertiary);flex-shrink:0;transition:transform .15s;}
.tree-arr.expanded{transform:rotate(90deg);}
.tree-empty{padding:20px;text-align:center;font-size:13px;color:var(--ant-text-tertiary);}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.status-dot.online{background:var(--ant-success);}
.status-dot.offline{background:var(--ant-error);}

.tree-pending-badge{font-size:11px;margin-left:auto;padding:1px 6px;border-radius:3px;color:#cf1322;background:#fff1f0;border:1px solid #ffa39e;flex-shrink:0;}
.device-pending-tag{display:inline-block;font-size:11px;padding:0 5px;border-radius:2px;color:#cf1322;background:#fff1f0;border:1px solid #ffa39e;line-height:18px;flex-shrink:0;}
.device-governed-tag{display:inline-block;font-size:11px;padding:0 5px;border-radius:2px;color:var(--ant-success);background:#f6ffed;border:1px solid #b7eb8f;line-height:18px;flex-shrink:0;}

/* ========== Map Area ========== */
.map-area{flex:1;position:relative;overflow:hidden;min-width:0;background:linear-gradient(150deg,#1a2332 0%,#243447 40%,#2d3e50 100%);}
.map-grid{position:absolute;inset:0;pointer-events:none;z-index:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 49px,rgba(255,255,255,.025) 49px,rgba(255,255,255,.025) 50px),repeating-linear-gradient(90deg,transparent,transparent 49px,rgba(255,255,255,.025) 49px,rgba(255,255,255,.025) 50px);}
.map-roads{position:absolute;inset:0;pointer-events:none;z-index:1;}
.map-road-h{position:absolute;height:2px;background:rgba(255,255,255,.06);left:0;right:0;}
.map-road-v{position:absolute;width:2px;background:rgba(255,255,255,.06);top:0;bottom:0;}
.map-road-label{position:absolute;font-size:9px;color:rgba(255,255,255,.2);font-family:monospace;pointer-events:none;z-index:2;}

/* ========== Floating: List Panel (Mode B) ========== */
.float-list{position:absolute;top:12px;left:12px;width:calc(50% - 18px);bottom:80px;background:#fff;border-radius:10px;box-shadow:var(--shadow-float);z-index:20;display:none;flex-direction:column;overflow:hidden;}
.float-list.show{display:flex;}
.float-list-hd{padding:10px 14px;border-bottom:1px solid var(--ant-border-secondary);display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:500;flex-shrink:0;}
.float-list-tabs{display:flex;gap:0;}
.float-list-tab{font-size:11px;padding:2px 8px;cursor:pointer;color:var(--ant-text-secondary);border-radius:4px;transition:.2s;}
.float-list-tab:hover{color:var(--ant-primary);}
.float-list-tab.active{color:var(--ant-primary);background:var(--ant-primary-bg);font-weight:500;}
.float-list-body{flex:1;overflow-y:auto;padding:6px 0;}
.float-list-item{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;transition:background .15s;}
.float-list-item:hover{background:rgba(0,0,0,.03);}
.float-list-item.active{background:var(--ant-primary-bg);}
.float-list-item .fli-info{flex:1;min-width:0;}
.float-list-item .fli-name{font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.float-list-item .fli-meta{font-size:11px;color:var(--ant-text-tertiary);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ========== Floating: Device Card ========== */
.float-card{position:absolute;top:12px;background:#fff;border-radius:10px;box-shadow:var(--shadow-float);z-index:20;display:none;overflow:hidden;}
.float-card.show{display:block;}

/* Mode A: side-by-side preview+info, centered */
.float-card.mode-a{left:50%;transform:translateX(-50%);right:auto;bottom:80px;width:760px;max-width:calc(100% - 24px);}
.float-card.mode-a .float-card-inner{padding:14px 16px;}
.float-card.mode-a .card-body{display:flex;gap:16px;align-items:flex-start;}
.float-card.mode-a .card-body .card-preview{flex:0 0 42%;min-width:0;}
.float-card.mode-a .card-body .card-info{flex:1;min-width:0;}

/* Mode B: equal width with list */
.float-card.mode-b{left:calc(50% + 6px);width:calc(50% - 18px);bottom:80px;}
.float-card.mode-b .float-card-inner{padding:14px 16px;}

.card-close{position:absolute;top:6px;right:6px;width:26px;height:26px;border:none;background:transparent;cursor:pointer;font-size:16px;color:var(--ant-text-tertiary);display:flex;align-items:center;justify-content:center;border-radius:6px;z-index:1;}
.card-close:hover{background:#f5f5f5;color:var(--ant-text);}

.card-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-right:20px;}
.card-header .dev-name{font-size:15px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.card-header .dev-type-tag{font-size:11px;padding:2px 8px;background:#f5f5f5;border-radius:4px;color:var(--ant-text-secondary);flex-shrink:0;}

.card-grid{display:grid;grid-template-columns:auto 1fr;gap:3px 14px;font-size:13px;}
.card-grid .lbl{color:var(--ant-text-tertiary);white-space:nowrap;font-size:12px;}
.card-grid .val{color:var(--ant-text);}
.card-grid .val.online{color:var(--ant-success);font-weight:500;}
.card-grid .val.offline{color:var(--ant-error);font-weight:500;}
.card-grid .val.miss{color:var(--ant-error);}
.card-grid .lbl.hl{font-size:12px;font-weight:500;color:var(--ant-primary);}
.card-grid .val.hl{font-size:13px;font-weight:600;color:var(--ant-primary);}

.card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;}
.card-tag{font-size:11px;padding:2px 8px;background:var(--ant-primary-bg);color:var(--ant-primary);border-radius:4px;}

/* Video box: 16:9 in Mode A, fixed height in Mode B */
.video-box{background:#000;border-radius:6px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.35);font-size:13px;cursor:pointer;position:relative;overflow:hidden;}
.video-box.online{color:rgba(255,255,255,.6);}
.video-box .video-placeholder{text-align:center;}
.video-box .video-placeholder .play-icon{font-size:28px;margin-bottom:4px;}

/* Mode A: 16:9 ratio */
.mode-a .video-box{width:100%;aspect-ratio:16/9;height:auto;}
/* Mode B: fixed height */
.mode-b .video-box{height:120px;margin-bottom:6px;}

/* ========== Coord Readout (with editable inputs) ========== */
.coord-read{position:absolute;bottom:12px;left:12px;background:rgba(0,0,0,.68);color:#fff;padding:7px 14px;border-radius:8px;font-size:13px;z-index:15;font-family:'SF Mono',Consolas,'Courier New',monospace;display:flex;align-items:center;gap:6px;}
.coord-read .muted{color:rgba(255,255,255,.5);}
.coord-read .coord-input{width:105px;height:26px;padding:0 6px;border:1px solid rgba(255,255,255,.25);border-radius:4px;background:rgba(255,255,255,.1);color:#fff;font-size:12px;font-family:inherit;outline:none;transition:border-color .2s;}
.coord-read .coord-input:focus{border-color:var(--ant-primary);background:rgba(255,255,255,.15);}
.coord-read .coord-input.error{border-color:var(--ant-error);}
.coord-read .coord-sep{color:rgba(255,255,255,.4);}
.coord-read .coord-label{font-size:11px;color:rgba(255,255,255,.45);margin-right:2px;}

/* ========== Action Buttons ========== */
.action-btns{position:absolute;bottom:12px;right:12px;display:flex;gap:8px;z-index:15;}
.act-btn{height:34px;padding:0 16px;border:1px solid var(--ant-border);border-radius:6px;background:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;box-shadow:0 2px 6px rgba(0,0,0,.06);transition:all .15s;color:var(--ant-text);}
.act-btn:hover:not(:disabled){border-color:var(--ant-primary);color:var(--ant-primary);}
.act-btn:disabled{opacity:.45;cursor:not-allowed;}
.act-btn.na{color:var(--ant-warning);border-color:#ffd591;}
.act-btn.confirm{background:var(--ant-primary);border-color:var(--ant-primary);color:#fff;}
.act-btn.confirm:hover:not(:disabled){background:var(--ant-primary-hover);border-color:var(--ant-primary-hover);color:#fff;}
.act-btn.confirm:disabled{background:#d9d9d9;border-color:#d9d9d9;color:#fff;}
.tooltip-wrap{position:relative;}
.tooltip-wrap .tip{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;font-size:12px;padding:4px 8px;border-radius:4px;white-space:nowrap;display:none;pointer-events:none;}
.tooltip-wrap .tip.show{display:block;}

.map-marker{position:absolute;width:22px;height:22px;border-radius:50%;background:var(--ant-primary);z-index:10;transform:translate(-50%,-50%);display:none;pointer-events:none;box-shadow:0 0 8px rgba(22,119,255,.5);}
.map-marker.show{display:block;}
.map-marker::after{content:'';position:absolute;inset:-8px;border-radius:50%;border:3px solid var(--ant-primary);animation:pulse 1.6s ease-out infinite;}
@keyframes pulse{0%{transform:scale(1);opacity:.7;}100%{transform:scale(3);opacity:0;}}

/* ========== Modal ========== */
.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:none;align-items:center;justify-content:center;}
.modal-mask.show{display:flex;}
.modal{width:500px;max-width:94vw;background:#fff;border-radius:8px;box-shadow:var(--shadow-2);overflow:hidden;}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--ant-border-secondary);font-size:15px;font-weight:600;}
.modal-bd{padding:20px;}
.modal-ft{display:flex;justify-content:flex-end;gap:8px;padding:12px 20px;border-top:1px solid var(--ant-border-secondary);}
.modal-close{width:28px;height:28px;border:none;background:transparent;cursor:pointer;font-size:18px;color:var(--ant-text-tertiary);display:flex;align-items:center;justify-content:center;border-radius:4px;}
.modal-close:hover{background:#f5f5f5;color:var(--ant-text);}
.radio-group{display:flex;flex-direction:column;gap:8px;}
.radio-item{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;color:var(--ant-text);padding:3px 0;}
.radio-item input{accent-color:var(--ant-primary);}
.other-input{margin:4px 0 0 23px;width:calc(100% - 23px);display:none;}
.other-input.show{display:block;}
.other-input input{width:100%;height:30px;padding:0 10px;border:1px solid var(--ant-border);border-radius:4px;font-size:13px;outline:none;}
.other-input input:focus{border-color:var(--ant-primary);}
.modal-textarea{width:100%;margin-top:10px;padding:8px 10px;border:1px solid var(--ant-border);border-radius:4px;font-size:13px;resize:vertical;min-height:56px;outline:none;font-family:inherit;}
.modal-textarea:focus{border-color:var(--ant-primary);}
.btn{height:32px;padding:0 15px;border:1px solid var(--ant-border);border-radius:4px;background:#fff;font-size:13px;cursor:pointer;color:var(--ant-text);}
.btn:hover{border-color:var(--ant-primary);color:var(--ant-primary);}
.btn-primary{background:var(--ant-primary);border-color:var(--ant-primary);color:#fff;}
.btn-primary:hover{background:var(--ant-primary-hover);border-color:var(--ant-primary-hover);color:#fff;}

/* Toast */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);z-index:2000;padding:10px 26px;border-radius:8px;font-size:14px;color:#fff;opacity:0;transition:opacity .35s;pointer-events:none;box-shadow:0 4px 14px rgba(0,0,0,.15);font-weight:500;}
.toast.show{opacity:1;}
.toast.ok{background:#52c41a;}
.toast.err{background:#ff4d4f;}
.toast.info{background:#1677ff;}
.toast.warn{background:#faad14;color:rgba(0,0,0,.88);}
</style>
</head>
<body>

<header class="header">
  <div class="logo"><i class="fa-solid fa-play"></i>视频智能运维管理平台</div>
  <div class="header-right">
    <span>教育局</span>
    <div class="header-stat"><span class="dot"></span>坐标覆盖率 75% (12/16)</div>
  </div>
</header>

<div class="main">
  <nav class="sidebar">
    <div class="menu-group-title">智能运维</div>
    <div class="menu-item" onclick="location.href='../ops-algorithm/list.html'"><i class="fa-solid fa-shapes"></i>检测算法</div>
    <div class="menu-item" onclick="location.href='../ops-inspection/list.html'"><i class="fa-solid fa-clipboard-list"></i>巡检任务</div>
    <div class="menu-item" onclick="location.href='../ops-log/list.html'"><i class="fa-solid fa-file-lines"></i>巡检日志</div>
    <div class="menu-item" onclick="location.href='../ops-sla/index.html'"><i class="fa-solid fa-chart-bar"></i>可用性报告</div>
    <div class="menu-item" onclick="location.href='../ops-alert/list.html'"><i class="fa-solid fa-triangle-exclamation"></i>故障预警</div>
    <div class="menu-group-title">视频治理</div>
    <div class="menu-item" onclick="location.href='../dg-governance/index.html'"><i class="fa-solid fa-chart-line"></i>治理效能</div>
    <div class="menu-item" onclick="location.href='../dg-tag/list.html'"><i class="fa-solid fa-tags"></i>标签管理</div>
    <div class="menu-item" onclick="location.href='../dg-device/list.html'"><i class="fa-solid fa-sliders"></i>设备治理</div>
    <div class="menu-item" onclick="location.href='../admin-bdg/list.html'"><i class="fa-solid fa-folder-tree"></i>业务目录生成</div>
    <div class="menu-item" onclick="location.href='../dg-annotation/list.html'"><i class="fa-solid fa-edit"></i>业务目录编排</div>
    <div class="menu-item active"><i class="fa-solid fa-location-dot"></i>经纬度治理</div>
  </nav>

  <aside class="left-panel">
    <div class="panel-hd">
      <span id="catalogLabel">📁 基础目录</span>
      <span class="cat-switch" id="catSwitch" onclick="toggleCatalog()">切换业务目录 ▾</span>
    </div>
    <div class="cat-dropdown" id="catDropdown">
      <select id="catSelect" onchange="switchBizCatalog()">
        <option value="">请选择业务目录</option>
        <option>余杭区视频监控</option>
        <option>西湖区视频监控</option>
      </select>
    </div>
    <div class="tab-bar">
      <div class="tab-item active" data-tab="all" id="tabAll">全部</div>
      <div class="tab-item" data-tab="pending" id="tabPending">待治理</div>
      <div class="tab-item" data-tab="done" id="tabDone">已治理</div>
    </div>
    <div class="tree" id="treeBox"></div>
  </aside>

  <section class="map-area" id="mapArea">
    <div class="map-grid"></div>
    <div class="map-roads">
      <div class="map-road-h" style="top:25%;"></div><div class="map-road-h" style="top:52%;"></div><div class="map-road-h" style="top:78%;"></div>
      <div class="map-road-v" style="left:30%;"></div><div class="map-road-v" style="left:62%;"></div><div class="map-road-v" style="left:85%;"></div>
      <div class="map-road-label" style="top:23%;left:8%;">南直路</div>
      <div class="map-road-label" style="top:50%;left:63%;">红旗大街</div>
      <div class="map-road-label" style="top:76%;left:32%;">长江路</div>
    </div>

    <!-- Mode B: List Panel (left half) -->
    <div class="float-list" id="floatList">
      <div class="float-list-hd">
        <span id="floatListTitle">设备列表</span>
        <div class="float-list-tabs">
          <span class="float-list-tab active" data-ft="all" onclick="switchFloatTab('all')">全部</span>
          <span class="float-list-tab" data-ft="pending" onclick="switchFloatTab('pending')">待治理</span>
          <span class="float-list-tab" data-ft="done" onclick="switchFloatTab('done')">已治理</span>
        </div>
      </div>
      <div class="float-list-body" id="floatListBody"></div>
    </div>

    <!-- Device Card (right half in Mode B, centered in Mode A) -->
    <div class="float-card" id="floatCard">
      <button class="card-close" onclick="closeCard()">✕</button>
      <div class="float-card-inner" id="cardInner"></div>
    </div>

    <div class="map-marker" id="mapMarker"></div>
    <div class="coord-read" id="coordRead">
      <span class="coord-label">经度</span><input type="text" class="coord-input" id="ciLng" placeholder="—" oninput="onCoordInput()">
      <span class="coord-sep">,</span>
      <span class="coord-label">纬度</span><input type="text" class="coord-input" id="ciLat" placeholder="—" oninput="onCoordInput()">
    </div>
    <div class="action-btns" id="actionBtns">
      <button class="act-btn na" id="btnNA" onclick="doNA()" disabled>不适用</button>
      <div class="tooltip-wrap" id="confirmTooltip">
        <button class="act-btn confirm" id="btnConfirm" onclick="doConfirm()" disabled>确认治理</button>
        <div class="tip" id="tipEl"></div>
      </div>
      <button class="act-btn" id="btnNext" onclick="doNext()" disabled>下一条</button>
    </div>
  </section>
</div>

<!-- NA Modal -->
<div class="modal-mask" id="naModalMask">
  <div class="modal">
    <div class="modal-hd"><span>标记为不适用</span><button class="modal-close" onclick="closeNAModal()">✕</button></div>
    <div class="modal-bd">
      <div style="font-size:13px;color:var(--ant-text-secondary);margin-bottom:10px;font-weight:500;">请选择不适用原因：</div>
      <div class="radio-group" id="naRadioGroup">
        <label class="radio-item"><input type="radio" name="naR" value="车载/移动点位，无固定坐标"> 车载/移动点位，无固定坐标</label>
        <label class="radio-item"><input type="radio" name="naR" value="设备长期离线，暂无法获取"> 设备长期离线，暂无法获取</label>
        <label class="radio-item"><input type="radio" name="naR" value="待确认"> 待确认</label>
        <label class="radio-item"><input type="radio" name="naR" value="暂不适用"> 暂不适用</label>
        <label class="radio-item"><input type="radio" name="naR" value="other" id="naOtherRadio"> 其他：</label>
      </div>
      <div class="other-input" id="naOtherRow"><input type="text" id="naOtherInput" placeholder="请输入其他原因..."></div>
      <div style="margin-top:14px;"><div style="font-size:13px;color:var(--ant-text-secondary);margin-bottom:6px;font-weight:500;">补充说明（可选）：</div>
      <textarea class="modal-textarea" id="naRemark" placeholder="请输入补充说明..."></textarea></div>
    </div>
    <div class="modal-ft">
      <button class="btn" onclick="closeNAModal()">取消</button>
      <button class="btn btn-primary" onclick="saveNA()">确认</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============ DATA ============
var orgTree = [
  {id:1,name:'教育局',children:[
    {id:'dev-1',name:'教学楼IPC-03',online:true,offlineReason:null,platform:'哈尔滨下级平台',parentOrg:'教育局',tags:['教室'],type:'球机·海康威视',lng:126.634521,lat:45.723389,governed:true,na:false,naReason:''},
    {id:'dev-2',name:'操场全景-02',online:true,offlineReason:null,platform:'哈尔滨下级平台',parentOrg:'教育局',tags:['操场'],type:'全景·大华',lng:null,lat:null,governed:false,na:false,naReason:''},
    {id:'dev-3',name:'实验楼枪机',online:false,offlineReason:'设备故障',platform:'哈尔滨下级平台',parentOrg:'教育局',tags:['走廊'],type:'枪机·海康威视',lng:null,lat:null,governed:false,na:false,naReason:''},
    {id:'dev-4',name:'校门口球机-01',online:true,offlineReason:null,platform:'哈尔滨下级平台',parentOrg:'教育局',tags:['校门口'],type:'球机·宇视',lng:126.639201,lat:45.729105,governed:true,na:false,naReason:''},
    {id:'dev-5',name:'图书馆半球-05',online:true,offlineReason:null,platform:'哈尔滨下级平台',parentOrg:'教育局',tags:['教室'],type:'半球·海康威视',lng:null,lat:null,governed:false,na:false,naReason:''},
    {id:'dev-6',name:'食堂枪机-07',online:false,offlineReason:'网络中断',platform:'哈尔滨下级平台',parentOrg:'教育局',tags:['走廊'],type:'枪机·大华',lng:null,lat:null,governed:true,na:true,naReason:'待确认'},
    {id:'dev-7',name:'体育馆全景-04',online:true,offlineReason:null,platform:'哈尔滨下级平台',parentOrg:'教育局',tags:['操场'],type:'全景·海康威视',lng:null,lat:null,governed:false,na:false,naReason:''},
    {id:'dev-8',name:'行政楼IPC-06',online:true,offlineReason:null,platform:'哈尔滨下级平台',parentOrg:'教育局',tags:['走廊'],type:'IPC·海康威视',lng:null,lat:null,governed:false,na:false,naReason:''},
  ]},
  {id:2,name:'林业局',children:[
    {id:'dev-20',name:'林区入口IPC-01',online:true,offlineReason:null,platform:'哈尔滨下级平台',parentOrg:'林业局',tags:['林区'],type:'IPC·海康威视',lng:126.652103,lat:45.741208,governed:true,na:false,naReason:''},
    {id:'dev-21',name:'瞭望塔全景-02',online:true,offlineReason:null,platform:'哈尔滨下级平台',parentOrg:'林业局',tags:['林区'],type:'全景·大华',lng:null,lat:null,governed:false,na:false,naReason:''},
    {id:'dev-22',name:'防火通道球机-03',online:true,offlineReason:null,platform:'哈尔滨下级平台',parentOrg:'林业局',tags:['林区'],type:'球机·宇视',lng:126.648329,lat:45.738914,governed:true,na:false,naReason:''},
  ]},
  {id:3,name:'城管局',children:[
    {id:'dev-30',name:'街道监控IPC-01',online:true,offlineReason:null,platform:'哈尔滨下级平台',parentOrg:'城管局',tags:['街道'],type:'IPC·海康威视',lng:null,lat:null,governed:false,na:false,naReason:''},
    {id:'dev-31',name:'广场球机-02',online:false,offlineReason:'设备报废',platform:'哈尔滨下级平台',parentOrg:'城管局',tags:['广场'],type:'球机·大华',lng:null,lat:null,governed:false,na:false,naReason:''},
    {id:'dev-32',name:'商业街枪机-03',online:true,offlineReason:null,platform:'哈尔滨下级平台',parentOrg:'城管局',tags:['街道'],type:'枪机·海康威视',lng:126.629834,lat:45.717823,governed:true,na:false,naReason:''},
  ]}
];

var deviceMap = {};
orgTree.forEach(function(o){ o.children.forEach(function(d){ deviceMap[d.id] = d; }); });

// ============ STATE ============
var currentTab = 'all';
var floatTab = 'all';
var selectedOrgId = null;
var currentDeviceId = null;
var currentOrgDevices = [];
var currentDeviceIdx = -1;
var markerPos = null;
var expandedOrgs = {1:true,2:true,3:true};
var catalogMode = 'basic';

// Map reference bounds (CGCS2000)
var MAP_LNG_MIN=126.62, MAP_LNG_MAX=126.66, MAP_LAT_MIN=45.71, MAP_LAT_MAX=45.75;

// ============ HELPERS ============
function getFilteredOrgDevices(orgId) {
  var org = orgTree.filter(function(o){return o.id===orgId;})[0];
  if(!org) return [];
  return org.children.filter(function(d){
    if(currentTab==='pending' && (d.lng!==null||d.governed||d.na)) return false;
    if(currentTab==='done' && !d.governed && !d.na) return false;
    return true;
  });
}

function isPending(d) { return !d.lng && !d.governed && !d.na; }
function isGoverned(d) { return d.governed || d.na; }

function getFloatFilteredDevices() {
  return currentOrgDevices.filter(function(d){
    if(floatTab==='pending') return isPending(d);
    if(floatTab==='done') return isGoverned(d);
    return true;
  });
}

// ============ COORD <> MAP PIXEL CONVERSION ============
function coordToPixel(lng, lat) {
  var area = document.getElementById('mapArea');
  var r = area.getBoundingClientRect();
  var x = (lng - MAP_LNG_MIN) / (MAP_LNG_MAX - MAP_LNG_MIN) * r.width;
  var y = (MAP_LAT_MAX - lat) / (MAP_LAT_MAX - MAP_LAT_MIN) * r.height;
  return {x:x, y:y};
}
function pixelToCoord(x, y) {
  var area = document.getElementById('mapArea');
  var r = area.getBoundingClientRect();
  var lng = MAP_LNG_MIN + (x/r.width) * (MAP_LNG_MAX - MAP_LNG_MIN);
  var lat = MAP_LAT_MAX - (y/r.height) * (MAP_LAT_MAX - MAP_LAT_MIN);
  return {lng:lng, lat:lat};
}

// ============ RENDER TREE ============
function renderTree() {
  var h = '';
  orgTree.forEach(function(org){
    var exp = expandedOrgs[org.id];
    var filtered = getFilteredOrgDevices(org.id);
    var nc = org.children.filter(function(d){return isPending(d);}).length;
    h += '<div class="tree-node">';
    h += '<div class="tree-row'+(selectedOrgId===org.id?' selected':'')+'" onclick="clickOrg('+org.id+')">';
    h += '<span class="tree-arr'+(exp?' expanded':'')+'" onclick="event.stopPropagation();toggleOrg('+org.id+')">▶</span>';
    h += '<span>📁</span><span style="font-size:13px;">'+org.name+'</span>';
    // 不展示待治理数量角标
    h += '</div>';
    if(exp){
      h += '<div style="padding-left:16px;">';
      if(filtered.length===0){
        h += '<div class="tree-empty">暂无符合条件的设备</div>';
      } else {
        filtered.forEach(function(d){
          var pending = isPending(d);
          h += '<div class="tree-node">';
          h += '<div class="tree-row device-row'+(currentDeviceId===d.id?' selected':'')+'" onclick="event.stopPropagation();clickDevice(\''+d.id+'\')">';
          h += '<span class="tree-arr" style="visibility:hidden;">▶</span>';
          h += '<span class="status-dot '+(d.online?'online':'offline')+'"></span>';
          if(pending){
            h += '<span class="device-pending-tag">待治理</span>';
          } else if(isGoverned(d)){
            h += '<span class="device-governed-tag">'+(d.na?'不适用':'已治理')+'</span>';
          }
          h += '<span style="font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+d.name+'</span>';
          h += '</div></div>';
        });
      }
      h += '</div>';
    }
    h += '</div>';
  });
  document.getElementById('treeBox').innerHTML=h;
}

function toggleOrg(id){expandedOrgs[id]=!expandedOrgs[id];renderTree();}
function clickOrg(id){
  selectedOrgId=id;currentDeviceId=null;
  var org = orgTree.filter(function(o){return o.id===id;})[0];
  currentOrgDevices = (org?org.children:[]).filter(function(d){
    if(currentTab==='pending') return isPending(d);
    if(currentTab==='done') return isGoverned(d);
    return true;
  });
  floatTab = currentTab;
  openModeB();
  if(currentOrgDevices.length>0) selectDevice(currentOrgDevices[0].id,0);
  renderTree();
}
function clickDevice(id){
  var d = deviceMap[id]; if(!d) return;
  currentDeviceId=id; selectedOrgId=null;
  openModeA();
  loadDevice(d);
  renderTree();
}

// ============ MODE A: Device Card Only (side-by-side) ============
function openModeA(){
  document.getElementById('floatList').classList.remove('show');
  document.getElementById('floatCard').classList.add('show','mode-a');
  document.getElementById('floatCard').classList.remove('mode-b');
}
// ============ MODE B: List + Card (equal width, equal height) ============
function openModeB(){
  document.getElementById('floatList').classList.add('show');
  document.getElementById('floatCard').classList.add('show','mode-b');
  document.getElementById('floatCard').classList.remove('mode-a');
  renderFloatList();
}

// ============ FLOAT LIST ============
function renderFloatList(){
  var org = orgTree.filter(function(o){return o.id===selectedOrgId;})[0];
  document.getElementById('floatListTitle').textContent = org?org.name:'设备列表';
  refreshFloatTabs();
  var f = getFloatFilteredDevices();
  var h = '';
  f.forEach(function(d,i){
    var pending = isPending(d);
    h += '<div class="float-list-item'+(currentDeviceId===d.id?' active':'')+'" onclick="selectDevice(\''+d.id+'\','+i+')">';
    h += '<span class="status-dot '+(d.online?'online':'offline')+'"></span>';
    h += '<div class="fli-info"><div class="fli-name">'+d.name+'</div><div class="fli-meta">'+d.id.toUpperCase()+' · '+(d.lng?d.lng.toFixed(4)+', '+d.lat.toFixed(4):'坐标空缺')+' · '+d.parentOrg+'</div></div>';
    if(pending) h += '<span class="device-pending-tag">待治理</span>';
    else if(isGoverned(d)) h += '<span class="device-governed-tag">'+(d.na?'不适用':'已治理')+'</span>';
    h += '</div>';
  });
  document.getElementById('floatListBody').innerHTML = h || '<div class="tree-empty">暂无设备</div>';
}

function selectDevice(id,idx){
  currentDeviceId=id; currentDeviceIdx=idx;
  renderFloatList();
  loadDevice(deviceMap[id]);
}

function switchFloatTab(tab){
  floatTab=tab; refreshFloatTabs(); currentDeviceId=null; currentDeviceIdx=-1;
  renderFloatList();
  if(getFloatFilteredDevices().length>0) selectDevice(getFloatFilteredDevices()[0].id,0);
}
function refreshFloatTabs(){
  document.querySelectorAll('.float-list-tab').forEach(function(t){
    t.classList.toggle('active',t.dataset.ft===floatTab);
  });
}

// ============ LOAD DEVICE ============
function loadDevice(d){
  if(!d) return;
  var hasCoord = d.lng!==null && !d.na;
  var coordText = hasCoord ? d.lng.toFixed(6)+', '+d.lat.toFixed(6) : (d.na?'不适用':'空缺 (-)');

  // Device info block
  var infoHTML =
    '<div class="card-header">'+
      '<span class="status-dot '+(d.online?'online':'offline')+'"></span>'+
      '<span class="dev-name">'+d.name+'</span>'+
      '<span class="dev-type-tag">'+d.type+'</span>'+
    '</div>'+
    '<div class="card-grid">'+
      '<div class="lbl hl">上级平台</div><div class="val hl">'+d.platform+'</div>'+
      '<div class="lbl hl">上级组织</div><div class="val hl">'+d.parentOrg+'</div>'+
      '<div class="lbl">编码</div><div class="val">'+d.id.toUpperCase()+'</div>'+
      '<div class="lbl">在线</div><div class="val '+(d.online?'online':'offline')+'">'+(d.online?'🟢 在线':'🔴 离线'+(d.offlineReason?' ('+d.offlineReason+')':''))+'</div>'+
      '<div class="lbl">经纬度</div><div class="val'+(hasCoord?'':' miss')+'">'+coordText+'</div>'+
      '<div class="lbl">类型</div><div class="val">'+d.type+'</div>'+
    '</div>'+
    ((d.tags||[]).length>0?'<div class="card-tags">'+d.tags.map(function(t){return '<span class="card-tag">'+t+'</span>';}).join('')+'</div>':'');

  // Video preview block
  var videoHTML =
    '<div class="video-box'+(d.online?' online':'')+'" onclick="togglePreview(\''+d.id+'\')">'+
      (d.online?'<div class="video-placeholder"><div class="play-icon">▶</div>点击播放预览</div>':'<div class="video-placeholder" style="color:rgba(255,255,255,.25);">设备离线，无法预览</div>')+
    '</div>';

  // Build inner HTML based on mode
  var isModeA = document.getElementById('floatCard').classList.contains('mode-a');
  if(isModeA){
    // Mode A: side-by-side layout — preview(left, 16:9) + info(right)
    document.getElementById('cardInner').innerHTML =
      '<div class="card-body">'+
        '<div class="card-preview">'+videoHTML+'</div>'+
        '<div class="card-info">'+infoHTML+'</div>'+
      '</div>';
  } else {
    // Mode B: stacked layout — info(top) + preview(bottom)
    document.getElementById('cardInner').innerHTML = infoHTML + videoHTML;
  }

  // Reset coord state
  clearCoordState();

  if(hasCoord && !d.governed){
    // Show existing coords in inputs
    markerPos = {lng:d.lng, lat:d.lat};
    var pixel = coordToPixel(d.lng, d.lat);
    markerPos.x = pixel.x; markerPos.y = pixel.y;
    document.getElementById('ciLng').value = d.lng.toFixed(6);
    document.getElementById('ciLat').value = d.lat.toFixed(6);
    placeMarkerAtPixel(pixel.x, pixel.y);
  } else if(d.governed && hasCoord){
    // Already governed: show coords but don't allow editing
    document.getElementById('ciLng').value = d.lng.toFixed(6);
    document.getElementById('ciLat').value = d.lat.toFixed(6);
  }

  updateBtns();
}

function clearCoordState(){
  markerPos=null;
  document.getElementById('mapMarker').classList.remove('show');
  document.getElementById('ciLng').value='';
  document.getElementById('ciLat').value='';
  document.getElementById('ciLng').classList.remove('error');
  document.getElementById('ciLat').classList.remove('error');
}

function placeMarkerAtPixel(x, y){
  var m = document.getElementById('mapMarker');
  m.style.left=x+'px'; m.style.top=y+'px';
  m.classList.add('show');
}

function closeCard(){
  currentDeviceId=null; currentDeviceIdx=-1; currentOrgDevices=[]; selectedOrgId=null;
  document.getElementById('floatCard').classList.remove('show','mode-a','mode-b');
  document.getElementById('floatList').classList.remove('show');
  clearCoordState();
  updateBtns();
  renderTree();
}

// ============ MAP CLICK ============
document.getElementById('mapArea').addEventListener('click',function(e){
  if(e.target.closest('.float-card')||e.target.closest('.float-list')||e.target.closest('.coord-read')||e.target.closest('.action-btns')) return;
  if(!currentDeviceId) return;
  var d = deviceMap[currentDeviceId]; if(!d) return;
  if(d.governed||d.na) return;
  var r = this.getBoundingClientRect();
  var x = e.clientX-r.left, y = e.clientY-r.top;
  var coord = pixelToCoord(x, y);
  markerPos={x:x, y:y, lng:coord.lng, lat:coord.lat};
  placeMarkerAtPixel(x, y);
  document.getElementById('ciLng').value=coord.lng.toFixed(6);
  document.getElementById('ciLat').value=coord.lat.toFixed(6);
  document.getElementById('ciLng').classList.remove('error');
  document.getElementById('ciLat').classList.remove('error');
  updateBtns();
});

// ============ COORD INPUT (editable in bottom-left) ============
function onCoordInput(){
  var lngStr = document.getElementById('ciLng').value.trim();
  var latStr = document.getElementById('ciLat').value.trim();
  var lng = parseFloat(lngStr), lat = parseFloat(latStr);
  var validLng = lngStr!=='' && !isNaN(lng) && lng>=-180 && lng<=180;
  var validLat = latStr!=='' && !isNaN(lat) && lat>=-90 && lat<=90;

  document.getElementById('ciLng').classList.toggle('error', lngStr!=='' && !validLng);
  document.getElementById('ciLat').classList.toggle('error', latStr!=='' && !validLat);

  if(validLng && validLat){
    var pixel = coordToPixel(lng, lat);
    markerPos = {lng:lng, lat:lat, x:pixel.x, y:pixel.y};
    placeMarkerAtPixel(pixel.x, pixel.y);
    updateBtns();
  } else {
    document.getElementById('btnConfirm').disabled=true;
  }
}

// ============ BUTTONS ============
function updateBtns(){
  var d = currentDeviceId?deviceMap[currentDeviceId]:null;
  var btnNA=document.getElementById('btnNA'), btnConfirm=document.getElementById('btnConfirm'), btnNext=document.getElementById('btnNext');
  var tipEl=document.getElementById('tipEl');

  if(!d){btnNA.disabled=true;btnConfirm.disabled=true;btnNext.disabled=true;tipEl.classList.remove('show');return;}

  btnNext.disabled=(currentDeviceIdx>=currentOrgDevices.length-1||currentOrgDevices.length===0);

  if(d.na){btnNA.disabled=true;btnConfirm.disabled=true;tipEl.textContent='已标记为不适用';tipEl.classList.add('show');return;}
  if(d.governed&&!d.na){btnNA.disabled=false;btnConfirm.disabled=true;tipEl.textContent='已治理，需重新拾取坐标';tipEl.classList.add('show');return;}

  btnNA.disabled=false;
  if(!markerPos){btnConfirm.disabled=true;tipEl.textContent='请先在地图上点击拾取坐标';tipEl.classList.add('show');}
  else{btnConfirm.disabled=false;tipEl.classList.remove('show');}
}

function doConfirm(){
  var d = currentDeviceId?deviceMap[currentDeviceId]:null;
  if(!d||!markerPos) return;
  d.lng=markerPos.lng; d.lat=markerPos.lat; d.governed=true; d.na=false;
  toast('已保存：'+d.name+' 坐标已更新','ok');
  loadDevice(d);
  renderTree();
  clearCoordState();
  updateBtns();
  setTimeout(function(){doNext();},600);
}

function doNext(){
  var f = getFloatFilteredDevices();
  if(currentDeviceIdx<0||currentDeviceIdx>=f.length-1){
    if(selectedOrgId) toast('当前目录层级下已是最后一台设备，请切换目录继续治理','info');
    else toast('已无可遍历的设备','info');
    document.getElementById('btnNext').disabled=true;
    return;
  }
  selectDevice(f[currentDeviceIdx+1].id,currentDeviceIdx+1);
}

// ============ NA MODAL ============
function doNA(){
  if(!currentDeviceId) return;
  var radios=document.getElementsByName('naR');
  for(var i=0;i<radios.length;i++) radios[i].checked=false;
  document.getElementById('naOtherInput').value='';
  document.getElementById('naOtherRow').classList.remove('show');
  document.getElementById('naRemark').value='';
  document.getElementById('naModalMask').classList.add('show');
}
function closeNAModal(){document.getElementById('naModalMask').classList.remove('show');}
function saveNA(){
  var d = currentDeviceId?deviceMap[currentDeviceId]:null; if(!d) return;
  var reason=null;
  var radios=document.getElementsByName('naR');
  for(var i=0;i<radios.length;i++){
    if(radios[i].checked){reason=radios[i].value==='other'?(document.getElementById('naOtherInput').value.trim()||'其他'):radios[i].value;break;}
  }
  if(!reason){toast('请选择不适用原因','warn');return;}
  d.na=true; d.governed=true; d.naReason=reason; d.lng=null; d.lat=null;
  closeNAModal();
  toast('已标记为不适用','ok');
  loadDevice(d); renderTree();
  clearCoordState();
  updateBtns();
  setTimeout(function(){doNext();},600);
}

document.getElementById('naOtherRadio').addEventListener('change',function(){
  if(this.checked){document.getElementById('naOtherRow').classList.add('show');document.getElementById('naOtherInput').focus();}
});
var allRadios=document.getElementsByName('naR');
for(var i=0;i<allRadios.length;i++){
  if(allRadios[i]!==document.getElementById('naOtherRadio')){
    allRadios[i].addEventListener('change',function(){document.getElementById('naOtherRow').classList.remove('show');});
  }
}
document.getElementById('naModalMask').addEventListener('click',function(e){if(e.target===this)closeNAModal();});

// ============ TABS ============
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab-item').forEach(function(t){t.classList.toggle('active',t.dataset.tab===tab);});
  selectedOrgId=null;currentDeviceId=null;currentOrgDevices=[];currentDeviceIdx=-1;
  document.getElementById('floatCard').classList.remove('show','mode-a','mode-b');
  document.getElementById('floatList').classList.remove('show');
  clearCoordState();
  updateBtns(); renderTree();
}
['tabAll','tabPending','tabDone'].forEach(function(id){
  document.getElementById(id).addEventListener('click',function(){switchTab(this.dataset.tab);});
});

// ============ CATALOG SWITCH ============
function toggleCatalog(){
  var dd=document.getElementById('catDropdown');
  dd.classList.toggle('show');
}
function switchBizCatalog(){
  var v = document.getElementById('catSelect').value;
  if(!v) return;
  document.getElementById('catalogLabel').textContent='📁 '+v;
  document.getElementById('catDropdown').classList.remove('show');
  renderTree();
}

// ============ PREVIEW ============
function togglePreview(id){
  var d = deviceMap[id]; if(!d||!d.online) return;
  var box = document.querySelector('.video-box');
  if(!box) return;
  if(box.querySelector('.play-icon') && box.querySelector('.play-icon').textContent==='▶'){
    box.innerHTML='<div class="video-placeholder"><div class="play-icon">⏸</div>播放中...</div>';
    box.style.background='#0a0a0a';
  } else {
    box.innerHTML='<div class="video-placeholder"><div class="play-icon">▶</div>点击播放预览</div>';
    box.style.background='#000';
  }
}

// ============ TOAST ============
var toastTimer=null;
function toast(msg,type){
  if(toastTimer) clearTimeout(toastTimer);
  var el=document.getElementById('toast');
  el.textContent=msg; el.className='toast '+type+' show';
  toastTimer=setTimeout(function(){el.classList.remove('show');toastTimer=null;},2500);
}

// ============ KEYBOARD ============
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    if(document.getElementById('naModalMask').classList.contains('show')) closeNAModal();
    else closeCard();
  }
});

// ============ INIT ============
renderTree();
</script>
</body>
</html>
